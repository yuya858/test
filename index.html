<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>見積依頼書</title>
  <style>
    :root {
      --line: #222;
      --paper: #fff;
      --ink: #111;
      --bg: #eef1f4;
      --accent: #1f6feb;
      --line-width: 1px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
      font-size: 13px;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 5;
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 10px max(10px, env(safe-area-inset-left)) 10px max(10px, env(safe-area-inset-right));
      background: #f8fafc;
      border-bottom: var(--line-width) solid #d0d7de;
      overflow-x: auto;
      white-space: nowrap;
    }

    .nav {
      display: flex;
      gap: 6px;
      padding-right: 10px;
      border-right: var(--line-width) solid #c8d0da;
    }

    button {
      min-height: 36px;
      border: var(--line-width) solid #9aa4b2;
      border-radius: 6px;
      background: #fff;
      color: #111;
      padding: 0 12px;
      font: inherit;
      touch-action: manipulation;
    }

    button.primary,
    button.active {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    button.danger {
      border-color: #c53030;
      color: #9b1c1c;
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .wrap {
      padding: 16px;
      overflow: auto;
    }

    .view[hidden] { display: none; }

    .sheet {
      width: 1120px;
      min-height: 760px;
      margin: 0 auto;
      background: var(--paper);
      padding: 34px 34px 28px;
      box-shadow: 0 8px 28px rgba(15, 23, 42, 0.18);
    }

    .list-panel {
      width: min(980px, 100%);
      margin: 0 auto;
      background: #fff;
      border: var(--line-width) solid #c8d0da;
      padding: 16px;
    }

    .list-panel h2 {
      margin: 0 0 14px;
      font-size: 18px;
      letter-spacing: 0;
    }

    .record-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    .record-table th,
    .record-table td {
      border: var(--line-width) solid #c8d0da;
      height: 42px;
      padding: 6px 8px;
      text-align: left;
    }

    .record-table th:last-child,
    .record-table td:last-child {
      text-align: right;
      width: 230px;
    }

    .candidate-actions {
      display: flex;
      justify-content: flex-end;
      gap: 6px;
      flex-wrap: wrap;
    }

    .candidate-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .candidate-title h2 {
      margin: 0;
    }

    .candidate-context {
      margin-left: auto;
      color: #374151;
      font-size: 14px;
      text-align: right;
      overflow-wrap: anywhere;
    }

    .part-choice {
      width: 100%;
      min-height: 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      border: 0;
      background: transparent;
      text-align: left;
      color: var(--ink);
      font: inherit;
      font-weight: 500;
      padding: 0;
    }

    .part-choice .part-number {
      color: #475569;
      white-space: nowrap;
    }

    .part-choice-heading {
      min-height: auto;
      font-weight: 600;
    }

    .part-choice-row.selected td {
      background: #e8f1ff;
      box-shadow: inset 0 0 0 2px #2563eb;
    }

    .candidate-row.selected td {
      background: #e8f1ff;
      box-shadow: inset 0 0 0 2px #2563eb;
    }

    .candidate-value-table th:last-child,
    .candidate-value-table td:last-child,
    .part-choice-table th:last-child,
    .part-choice-table td:last-child {
      width: auto;
      text-align: left;
    }

    .empty {
      padding: 24px 8px;
      color: #6b7280;
      text-align: center;
      border: var(--line-width) solid #c8d0da;
      background: #fff;
    }

    .header {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      align-items: end;
      margin-bottom: 20px;
    }

    .recipient-line {
      display: grid;
      grid-template-columns: 1fr 54px;
      align-items: end;
      gap: 8px;
      padding-bottom: 2px;
      border-bottom: var(--line-width) solid var(--line);
      min-height: 28px;
    }

    .recipient-line .sama {
      text-align: right;
      padding-right: 2px;
    }

    h1 {
      margin: 0;
      text-align: center;
      font-size: 24px;
      letter-spacing: 0;
      font-weight: 600;
    }

    .company {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      text-align: right;
      font-size: 17px;
      font-weight: 600;
    }

    .company-mark {
      width: 24px;
      height: 24px;
      flex: 0 0 auto;
    }

    .company-mark line,
    .company-mark path,
    .company-mark text {
      stroke: currentColor;
      fill: none;
      stroke-width: 1.35;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .company-mark text {
      fill: currentColor;
      stroke: none;
      font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
      font-size: 9px;
      font-weight: 700;
      dominant-baseline: central;
      text-anchor: middle;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    td, th {
      border: var(--line-width) solid var(--line);
      padding: 0;
      height: 30px;
      vertical-align: middle;
      text-align: center;
      font-weight: 400;
      overflow: hidden;
    }

    .top td { height: 30px; }

    .entry {
      width: 100%;
      height: 100%;
      border: 0;
      border-radius: 0;
      background: transparent;
      color: var(--ink);
      font: inherit;
      font-size: inherit;
      font-weight: 500;
      text-align: inherit;
      padding: 3px 6px;
      outline: none;
    }

    textarea.entry {
      resize: none;
      display: block;
      line-height: 1.5;
      text-align: left;
    }

    .right { text-align: right; }
    .left { text-align: left; }

    .sama-field {
      font-size: 20px;
    }

    .sama-wrap {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      width: 100%;
      height: 100%;
      padding-right: 12px;
      gap: 4px;
    }

    .sama-wrap .entry {
      flex: 1 1 auto;
      min-width: 0;
      text-align: right;
      padding-right: 2px;
    }

    .sama-wrap span {
      flex: 0 0 auto;
    }

    .property-cell,
    .repair-cell {
      height: 42px;
    }

    .top td.property-cell,
    .top td.repair-cell {
      height: 42px;
    }

    .property-box,
    .repair-box {
      display: grid;
      align-items: center;
      width: 100%;
      height: 100%;
      padding: 0 8px;
    }

    .property-box {
      grid-template-columns: 76px 1fr;
    }

    .repair-box {
      grid-template-columns: 84px 1fr 60px 220px;
      gap: 8px;
    }

    .property-box .entry,
    .repair-box .entry {
      text-align: left;
    }

    .inline-date {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      width: 100%;
      height: 100%;
      padding: 0 6px;
      white-space: nowrap;
    }

    .inline-date .entry {
      width: 44px;
      flex: 0 0 auto;
      text-align: center;
      padding: 2px;
    }

    .inline-date .year-input {
      width: 56px;
    }

    .label { font-size: 12px; }
    .items th { height: 29px; font-size: 12px; }
    .items td { height: 32px; }
    .notes { height: 112px; }

    .notes-box {
      display: grid;
      grid-template-rows: 28px 1fr 28px;
      height: 100%;
    }

    .notes-title {
      text-align: left;
      padding: 6px 8px 0;
      font-weight: 600;
    }

    .repair-time {
      text-align: center;
      white-space: nowrap;
    }

    .confirm-backdrop {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      background: rgba(15, 23, 42, 0.42);
      padding: 20px;
    }

    .confirm-backdrop[hidden] {
      display: none;
    }

    .confirm-box {
      width: min(320px, 100%);
      background: #fff;
      border: var(--line-width) solid #9aa4b2;
      border-radius: 8px;
      padding: 18px;
      box-shadow: 0 12px 32px rgba(15, 23, 42, 0.28);
    }

    .confirm-box p {
      margin: 0 0 14px;
      font-size: 15px;
    }

    .confirm-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .suggest-box {
      position: sticky;
      top: 57px;
      z-index: 30;
      display: flex;
      gap: 8px;
      align-items: center;
      min-height: 48px;
      max-height: 96px;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 6px 10px;
      background: #fff;
      border-bottom: var(--line-width) solid #c8d0da;
      box-shadow: 0 4px 14px rgba(15, 23, 42, 0.12);
    }

    .suggest-box[hidden] {
      display: none;
    }

    .suggest-option {
      flex: 0 0 auto;
      min-height: 32px;
      border: var(--line-width) solid #9aa4b2;
      border-radius: 6px;
      padding: 4px 12px;
      text-align: center;
      background: #f8fafc;
    }

    @media (max-width: 1180px) {
      .wrap {
        padding: 10px;
        overflow: auto;
      }

      .toolbar {
        align-items: flex-start;
      }

      .sheet {
        width: 1120px;
        padding: 28px;
        margin: 0;
        transform: scale(var(--sheet-scale, 1));
        transform-origin: top left;
      }

      .entry {
        font-size: 16px;
      }

      #candidateView .list-panel {
        padding: 10px;
      }

      .candidate-title {
        align-items: flex-start;
        flex-direction: column;
      }

      .candidate-context {
        margin-left: 0;
        text-align: left;
        width: 100%;
      }

      #candidateView .record-table {
        border-collapse: separate;
        border-spacing: 0 8px;
      }

      #candidateView .record-table thead {
        display: none;
      }

      #candidateView .record-table tr {
        display: block;
        border: var(--line-width) solid #c8d0da;
        background: #fff;
        padding: 6px;
      }

      #candidateView .record-table td {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        width: 100% !important;
        min-height: 34px;
        height: auto;
        border: 0;
        border-bottom: var(--line-width) solid #edf1f5;
        text-align: left !important;
        white-space: normal;
        overflow-wrap: anywhere;
      }

      #candidateView .record-table td:last-child {
        border-bottom: 0;
      }

      #candidateView .record-table td::before {
        content: attr(data-label);
        flex: 0 0 92px;
        color: #52606d;
        font-size: 12px;
      }

      #candidateView .record-table button {
        min-height: 32px;
        padding: 0 9px;
      }
    }

    @media print {
      @page { size: A4 landscape; margin: 5mm; }
      html, body {
        width: 287mm;
        height: 200mm;
        margin: 0;
        background: #fff;
        overflow: hidden;
      }
      .toolbar, .list-panel, .confirm-backdrop, .suggest-box { display: none; }
      .wrap {
        width: 287mm;
        height: 200mm;
        padding: 0;
        overflow: hidden;
      }
      .view[hidden] { display: block; }
      #savedView, #draftView, #candidateView, #trashView { display: none; }
      #estimateView {
        width: 287mm;
        height: 200mm;
        overflow: hidden;
        page-break-after: avoid;
        page-break-inside: avoid;
        break-after: avoid;
        break-inside: avoid;
      }
      .sheet {
        width: 268mm;
        height: 194mm;
        min-height: 0;
        box-shadow: none;
        padding: 0;
        margin: 0 auto;
        overflow: hidden;
        transform: none !important;
        page-break-after: avoid;
        page-break-inside: avoid;
        break-after: avoid;
        break-inside: avoid;
      }
      body { font-size: var(--print-font-size, 10.5px); }
      .header { margin-bottom: 6px; }
      h1 { font-size: 19px; }
      .company { font-size: 14px; }
      td, th { height: 23px; }
      .top td { height: 23px; }
      .top td.property-cell,
      .top td.repair-cell { height: 32px; }
      .items th { height: var(--print-item-header-height, 22px); font-size: 9.5px; }
      .items td { height: var(--print-item-row-height, 24px); }
      .notes { height: var(--print-notes-height, 68px); }
      .notes-box { grid-template-rows: 19px 1fr 22px; }
      .sama-field { font-size: 17px; }
      .label { font-size: 10px; }
      .entry { font-size: inherit; }
      input, textarea { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }
  </style>
</head>
<body>
  <div class="toolbar" aria-label="操作">
    <div class="nav" aria-label="一覧">
      <button class="active" data-view-button="estimate" type="button">見積もり</button>
      <button data-view-button="draft" type="button">未保存</button>
      <button data-view-button="saved" type="button">保存した見積もり</button>
      <button data-view-button="candidate" type="button">候補一覧</button>
      <button data-view-button="trash" type="button">ゴミ箱</button>
    </div>
    <button class="primary" id="saveBtn" type="button">保存</button>
    <button id="newBtn" type="button">新規</button>
    <button id="undoBtn" type="button" disabled>一つ前へ戻る</button>
    <button id="printBtn" type="button">印刷</button>
    <button id="insertRowBtn" type="button">改行</button>
    <button id="addRowBtn" type="button">行追加</button>
    <button id="removeRowBtn" type="button">行削除</button>
    <button id="clearBtn" type="button">クリア</button>
  </div>
  <div class="suggest-box" id="suggestBox" hidden></div>

  <main class="wrap">
    <section class="view" id="estimateView">
      <div class="sheet" id="sheet">
        <div class="header">
          <div class="recipient-line">
            <input class="entry" data-key="recipient" aria-label="宛先">
            <span class="sama">御中</span>
          </div>
          <h1>見　積　依　頼　書</h1>
          <div class="company">
            <svg class="company-mark" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 2.8 L21.2 12 L12 21.2 L2.8 12 Z"></path>
              <line x1="4.5" y1="9.7" x2="9.7" y2="4.5"></line>
              <line x1="14.3" y1="4.5" x2="19.5" y2="9.7"></line>
              <line x1="19.5" y1="14.3" x2="14.3" y2="19.5"></line>
              <line x1="9.7" y1="19.5" x2="4.5" y2="14.3"></line>
              <text x="12" y="12.4">工</text>
            </svg>
            <span>菱井工業株式会社</span>
          </div>
        </div>

        <table class="top">
          <colgroup>
            <col style="width: 8%"><col style="width: 8%"><col style="width: 8%"><col style="width: 8%">
            <col style="width: 9%"><col style="width: 8%"><col style="width: 8%"><col style="width: 8%">
            <col style="width: 9%"><col style="width: 9%"><col style="width: 9%"><col style="width: 8%">
          </colgroup>
          <tbody>
            <tr>
              <td colspan="4"></td>
              <td>部品</td>
              <td>手配</td>
              <td colspan="2">見積</td>
              <td colspan="4">
                <div class="inline-date">
                  <span>【至急】</span>
                  <input class="entry" data-key="urgent_month" aria-label="至急 月">
                  <span>月</span>
                  <input class="entry" data-key="urgent_day" aria-label="至急 日">
                  <span>日迄】</span>
                </div>
              </td>
            </tr>
            <tr>
              <td colspan="4" class="label">ユーザー名</td>
              <td class="label">担当者</td>
              <td colspan="3" class="label">住　　所</td>
              <td colspan="4" class="label">経由／代理店　　（担当者）　　住所</td>
            </tr>
            <tr>
              <td colspan="4" rowspan="2" class="sama-field"><div class="sama-wrap"><input class="entry" data-key="user_name" aria-label="ユーザー名"><span>様</span></div></td>
              <td rowspan="2" class="sama-field"><div class="sama-wrap"><input class="entry" data-key="person_in_charge" aria-label="担当者"><span>様</span></div></td>
              <td colspan="3" rowspan="2"><textarea class="entry" data-key="address" aria-label="住所"></textarea></td>
              <td colspan="4" rowspan="2"><textarea class="entry" data-key="agency" aria-label="経由代理店"></textarea></td>
            </tr>
            <tr></tr>
            <tr>
              <td colspan="5" class="property-cell">
                <div class="property-box"><span class="label">物件名</span><input class="entry" data-key="property_name" aria-label="物件名"></div>
              </td>
              <td colspan="7" class="repair-cell">
                <div class="repair-box">
                  <span class="label">修理者　点検者</span>
                  <input class="entry" data-key="repair_staff" aria-label="修理者 点検者">
                  <span class="label">作成日時</span>
                  <div class="inline-date">
                    <input class="entry year-input" data-key="created_year" aria-label="作成年">
                    <span>年</span>
                    <input class="entry" data-key="created_month" aria-label="作成月">
                    <span>月</span>
                    <input class="entry" data-key="created_day" aria-label="作成日">
                    <span>日</span>
                  </div>
                </div>
              </td>
            </tr>
          </tbody>
        </table>

        <table class="items" id="itemsTable">
          <colgroup>
            <col style="width: 3%"><col style="width: 15%"><col style="width: 7%"><col style="width: 14%">
            <col style="width: 13%"><col style="width: 19%"><col style="width: 10%"><col style="width: 5%">
            <col style="width: 7%"><col style="width: 7%">
          </colgroup>
          <thead>
            <tr>
              <th></th>
              <th>設置場所</th>
              <th>メーカー</th>
              <th>型　　式</th>
              <th>製造No</th>
              <th>部　品　名</th>
              <th>部品番号</th>
              <th>数量</th>
              <th>仕入金額</th>
              <th>売上金額</th>
            </tr>
          </thead>
          <tbody id="itemRows"></tbody>
        </table>

        <table>
          <tbody>
            <tr>
              <td class="notes">
                <div class="notes-box">
                  <div class="notes-title">《連絡事項》</div>
                  <textarea class="entry" data-key="notes" aria-label="連絡事項"></textarea>
                  <div class="repair-time">【修理時間】　<input class="entry" style="width: 52px; height: 24px;" data-key="workers" aria-label="人数">人　×　（　<input class="entry" style="width: 70px; height: 24px;" data-key="hours" aria-label="時間">時間　　　<input class="entry" style="width: 52px; height: 24px;" data-key="days" aria-label="日数">日）</div>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

    <section class="view" id="savedView" hidden>
      <div class="list-panel">
        <h2>保存した見積もり</h2>
        <div style="display:flex; gap:8px; align-items:center; margin-bottom:12px; flex-wrap:wrap;">
          <input id="savedSearchInput" style="min-height:36px; padding:0 8px; min-width:260px; flex:1;" placeholder="ユーザー名・会社名・物件名などで検索">
          <button id="savedSearchClearBtn" type="button">検索クリア</button>
        </div>
        <div id="savedList"></div>
      </div>
    </section>

    <section class="view" id="draftView" hidden>
      <div class="list-panel">
        <h2>未保存</h2>
        <div id="draftList"></div>
      </div>
    </section>

    <section class="view" id="candidateView" hidden>
      <div class="list-panel">
        <div class="candidate-title">
          <h2>候補一覧</h2>
          <div id="candidateContext" class="candidate-context"></div>
        </div>
        <div id="candidateTabs" style="display:flex; gap:8px; align-items:center; margin-bottom:8px; flex-wrap:wrap;">
          <button class="active" type="button" data-candidate-key="user_name">ユーザー名</button>
          <button type="button" data-candidate-key="property_name">物件名</button>
          <button type="button" data-candidate-key="items.maker">メーカー</button>
          <button id="candidateBackBtn" type="button" hidden>一つ前に戻る</button>
        </div>
        <div id="makerCandidateTabs" hidden></div>
        <div style="display:flex; gap:8px; align-items:center; margin-bottom:12px; flex-wrap:wrap;">
          <button id="candidateMenuBtn" type="button">候補</button>
          <button id="candidateBulkAddBtn" type="button" disabled>見積追加</button>
          <button id="candidateEditSelectedBtn" type="button" disabled>編集</button>
          <button class="danger" id="candidateDeleteSelectedBtn" type="button" disabled>削除</button>
        </div>
        <div id="candidateMenu" hidden style="display:flex; gap:8px; align-items:center; margin-bottom:12px; flex-wrap:wrap;">
          <button id="candidateAddStartBtn" type="button">候補の追加</button>
          <button id="candidateShowListBtn" type="button">候補一覧</button>
        </div>

  <div class="confirm-backdrop" id="clearConfirm" hidden>

      <div class="confirm-actions">
        <button id="undoNoBtn" type="button">いいえ</button>

  <div class="confirm-backdrop" id="makerMissingConfirm" hidden>
    <div class="confirm-box" role="dialog" aria-modal="true" aria-labelledby="makerMissingTitle">
      <p id="makerMissingTitle">設置場所にメーカーが書かれていません</p>
      <div class="confirm-actions">
        <button id="makerMissingOkBtn" type="button">OK</button>

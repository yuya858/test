<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>見積依頼書</title>
  <style>
    :root {
      --line: #222;
      --paper: #fff;
      --ink: #111;
      --bg: #eef1f4;
      --accent: #1f6feb;
      --line-width: 1px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
      font-size: 13px;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 5;
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 10px max(10px, env(safe-area-inset-left)) 10px max(10px, env(safe-area-inset-right));
      background: #f8fafc;
      border-bottom: var(--line-width) solid #d0d7de;
      overflow-x: auto;
      white-space: nowrap;
    }

    .nav {
      display: flex;
      gap: 6px;
      padding-right: 10px;
      border-right: var(--line-width) solid #c8d0da;
    }

    button {
      min-height: 36px;
      border: var(--line-width) solid #9aa4b2;
      border-radius: 6px;
      background: #fff;
      color: #111;
      padding: 0 12px;
      font: inherit;
      touch-action: manipulation;
    }

    button.primary,
    button.active {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    button.danger {
      border-color: #c53030;
      color: #9b1c1c;
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .wrap {
      padding: 16px;
      overflow: auto;
    }

    .view[hidden] { display: none; }

    .sheet {
      width: 1120px;
      min-height: 760px;
      margin: 0 auto;
      background: var(--paper);
      padding: 34px 34px 28px;
      box-shadow: 0 8px 28px rgba(15, 23, 42, 0.18);
    }

    .list-panel {
      width: min(980px, 100%);
      margin: 0 auto;
      background: #fff;
      border: var(--line-width) solid #c8d0da;
      padding: 16px;
    }

    .list-panel h2 {
      margin: 0 0 14px;
      font-size: 18px;
      letter-spacing: 0;
    }

    .record-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    .record-table th,
    .record-table td {
      border: var(--line-width) solid #c8d0da;
      height: 42px;
      padding: 6px 8px;
      text-align: left;
    }

    .record-table th:last-child,
    .record-table td:last-child {
      text-align: right;
      width: 230px;
    }

    .empty {
      padding: 24px 8px;
      color: #6b7280;
      text-align: center;
      border: var(--line-width) solid #c8d0da;
      background: #fff;
    }

    .header {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      align-items: end;
      margin-bottom: 20px;
    }

    .recipient-line {
      display: grid;
      grid-template-columns: 1fr 54px;
      align-items: end;
      gap: 8px;
      padding-bottom: 2px;
      border-bottom: var(--line-width) solid var(--line);
      min-height: 28px;
    }

    .recipient-line .sama {
      text-align: right;
      padding-right: 2px;
    }

    h1 {
      margin: 0;
      text-align: center;
      font-size: 24px;
      letter-spacing: 0;
      font-weight: 600;
    }

    .company {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      text-align: right;
      font-size: 17px;
      font-weight: 600;
    }

    .company-mark {
      width: 24px;
      height: 24px;
      flex: 0 0 auto;
    }

    .company-mark line,
    .company-mark path,
    .company-mark text {
      stroke: currentColor;
      fill: none;
      stroke-width: 1.35;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .company-mark text {
      fill: currentColor;
      stroke: none;
      font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
      font-size: 9px;
      font-weight: 700;
      dominant-baseline: central;
      text-anchor: middle;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    td, th {
      border: var(--line-width) solid var(--line);
      padding: 0;
      height: 30px;
      vertical-align: middle;
      text-align: center;
      font-weight: 400;
      overflow: hidden;
    }

    .top td { height: 30px; }

    .entry {
      width: 100%;
      height: 100%;
      border: 0;
      border-radius: 0;
      background: transparent;
      color: var(--ink);
      font: inherit;
      font-size: inherit;
      text-align: inherit;
      padding: 3px 6px;
      outline: none;
    }

    textarea.entry {
      resize: none;
      display: block;
      line-height: 1.5;
      text-align: left;
    }

    .right { text-align: right; }
    .left { text-align: left; }

    .sama-field {
      font-size: 20px;
    }

    .sama-wrap {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      width: 100%;
      height: 100%;
      padding-right: 12px;
      gap: 4px;
    }

    .sama-wrap .entry {
      flex: 1 1 auto;
      min-width: 0;
      text-align: right;
      padding-right: 2px;
    }

    .sama-wrap span {
      flex: 0 0 auto;
    }

    .property-cell,
    .repair-cell {
      height: 42px;
    }

    .top td.property-cell,
    .top td.repair-cell {
      height: 42px;
    }

    .property-box,
    .repair-box {
      display: grid;
      align-items: center;
      width: 100%;
      height: 100%;
      padding: 0 8px;
    }

    .property-box {
      grid-template-columns: 76px 1fr;
    }

    .repair-box {
      grid-template-columns: 96px 1fr 76px 150px;
      gap: 8px;
    }

    .property-box .entry,
    .repair-box .entry {
      text-align: left;
    }

    .inline-date {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      width: 100%;
      height: 100%;
      padding: 0 6px;
      white-space: nowrap;
    }

    .inline-date .entry {
      width: 44px;
      flex: 0 0 auto;
      text-align: center;
      padding: 2px;
    }

    .inline-date .year-input {
      width: 56px;
    }

    .label { font-size: 12px; }
    .items th { height: 29px; font-size: 12px; }
    .items td { height: 32px; }
    .notes { height: 112px; }

    .notes-box {
      display: grid;
      grid-template-rows: 28px 1fr 28px;
      height: 100%;
    }

    .notes-title {
      text-align: left;
      padding: 6px 8px 0;
      font-weight: 600;
    }

    .repair-time {
      text-align: center;
      white-space: nowrap;
    }

    .confirm-backdrop {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      background: rgba(15, 23, 42, 0.42);
      padding: 20px;
    }

    .confirm-backdrop[hidden] {
      display: none;
    }

    .confirm-box {
      width: min(320px, 100%);
      background: #fff;
      border: var(--line-width) solid #9aa4b2;
      border-radius: 8px;
      padding: 18px;
      box-shadow: 0 12px 32px rgba(15, 23, 42, 0.28);
    }

    .confirm-box p {
      margin: 0 0 14px;
      font-size: 15px;
    }

    .confirm-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .suggest-box {
      position: sticky;
      top: 57px;
      z-index: 30;
      display: flex;
      gap: 8px;
      align-items: center;
      min-height: 48px;
      max-height: 96px;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 6px 10px;
      background: #fff;
      border-bottom: var(--line-width) solid #c8d0da;
      box-shadow: 0 4px 14px rgba(15, 23, 42, 0.12);
    }

    .suggest-box[hidden] {
      display: none;
    }

    .suggest-option {
      flex: 0 0 auto;
      min-height: 32px;
      border: var(--line-width) solid #9aa4b2;
      border-radius: 6px;
      padding: 4px 12px;
      text-align: center;
      background: #f8fafc;
    }

    @media (max-width: 1180px) {
      .wrap {
        padding: 10px;
        overflow: auto;
      }

      .toolbar {
        align-items: flex-start;
      }

      .sheet {
        width: 1120px;
        padding: 28px;
        margin: 0;
        transform: scale(var(--sheet-scale, 1));
        transform-origin: top left;
      }

      .entry {
        font-size: 16px;
      }
    }

    @media print {
      @page { size: A4 landscape; margin: 6mm; }
      body { background: #fff; }
      .toolbar, .list-panel, .confirm-backdrop, .suggest-box { display: none; }
      .wrap { padding: 0; overflow: visible; }
      .view[hidden] { display: block; }
      #savedView, #draftView, #candidateView, #trashView { display: none; }
      .sheet {
        width: 285mm;
        height: 198mm;
        min-height: 0;
        box-shadow: none;
        padding: 0;
        margin: 0 auto;
      }
      body { font-size: var(--print-font-size, 11px); }
      .header { margin-bottom: 10px; }
      h1 { font-size: 20px; }
      .company { font-size: 14px; }
      td, th { height: 25px; }
      .top td { height: 25px; }
      .top td.property-cell,
      .top td.repair-cell { height: 36px; }
      .items th { height: var(--print-item-header-height, 24px); font-size: 10px; }
      .items td { height: var(--print-item-row-height, 27px); }
      .notes { height: var(--print-notes-height, 85px); }
      .notes-box { grid-template-rows: 22px 1fr 24px; }
      .sama-field { font-size: 17px; }
      .label { font-size: 10px; }
      .entry { font-size: inherit; }
      input, textarea { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }
  </style>
</head>
<body>
  <div class="toolbar" aria-label="操作">
    <div class="nav" aria-label="一覧">
      <button class="active" data-view-button="estimate" type="button">見積もり</button>
      <button data-view-button="draft" type="button">未保存</button>
      <button data-view-button="saved" type="button">保存した見積もり</button>
      <button data-view-button="candidate" type="button">候補一覧</button>
      <button data-view-button="trash" type="button">ゴミ箱</button>
    </div>
    <button class="primary" id="saveBtn" type="button">保存</button>
    <button id="newBtn" type="button">新規</button>
    <button id="printBtn" type="button">印刷</button>
    <button id="addRowBtn" type="button">行追加</button>
    <button id="removeRowBtn" type="button">行削除</button>
    <button id="clearBtn" type="button">クリア</button>
  </div>
  <div class="suggest-box" id="suggestBox" hidden></div>

  <main class="wrap">
    <section class="view" id="estimateView">
      <div class="sheet" id="sheet">
        <div class="header">
          <div class="recipient-line">
            <input class="entry" data-key="recipient" aria-label="宛先">
            <span class="sama">御中</span>
          </div>
          <h1>見　積　依　頼　書</h1>
          <div class="company">
            <svg class="company-mark" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 2.8 L21.2 12 L12 21.2 L2.8 12 Z"></path>
              <line x1="4.5" y1="9.7" x2="9.7" y2="4.5"></line>
              <line x1="14.3" y1="4.5" x2="19.5" y2="9.7"></line>
              <line x1="19.5" y1="14.3" x2="14.3" y2="19.5"></line>
              <line x1="9.7" y1="19.5" x2="4.5" y2="14.3"></line>
              <text x="12" y="12.4">工</text>
            </svg>
            <span>菱井工業株式会社</span>
          </div>
        </div>

        <table class="top">
          <colgroup>
            <col style="width: 8%"><col style="width: 8%"><col style="width: 8%"><col style="width: 8%">
            <col style="width: 9%"><col style="width: 8%"><col style="width: 8%"><col style="width: 8%">
            <col style="width: 9%"><col style="width: 9%"><col style="width: 9%"><col style="width: 8%">
          </colgroup>
          <tbody>
            <tr>
              <td colspan="4"></td>
              <td>部品</td>
              <td>手配</td>
              <td colspan="2">見積</td>
              <td colspan="4">
                <div class="inline-date">
                  <span>【至急】</span>
                  <input class="entry" data-key="urgent_month" aria-label="至急 月">
                  <span>月</span>
                  <input class="entry" data-key="urgent_day" aria-label="至急 日">
                  <span>日迄】</span>
                </div>
              </td>
            </tr>
            <tr>
              <td colspan="4" class="label">ユーザー名</td>
              <td class="label">担当者</td>
              <td colspan="3" class="label">住　　所</td>
              <td colspan="4" class="label">経由／代理店　　（担当者）　　住所</td>
            </tr>
            <tr>
              <td colspan="4" rowspan="2" class="sama-field"><div class="sama-wrap"><input class="entry" data-key="user_name" aria-label="ユーザー名"><span>様</span></div></td>
              <td rowspan="2" class="sama-field"><div class="sama-wrap"><input class="entry" data-key="person_in_charge" aria-label="担当者"><span>様</span></div></td>
              <td colspan="3" rowspan="2"><textarea class="entry" data-key="address" aria-label="住所"></textarea></td>
              <td colspan="4" rowspan="2"><textarea class="entry" data-key="agency" aria-label="経由代理店"></textarea></td>
            </tr>
            <tr></tr>
            <tr>
              <td colspan="5" class="property-cell">
                <div class="property-box"><span class="label">物件名</span><input class="entry" data-key="property_name" aria-label="物件名"></div>
              </td>
              <td colspan="7" class="repair-cell">
                <div class="repair-box">
                  <span class="label">修理者　点検者</span>
                  <input class="entry" data-key="repair_staff" aria-label="修理者 点検者">
                  <span class="label">作成日時</span>
                  <div class="inline-date">
                    <input class="entry year-input" data-key="created_year" aria-label="作成年">
                    <span>年</span>
                    <input class="entry" data-key="created_month" aria-label="作成月">
                    <span>月</span>
                    <input class="entry" data-key="created_day" aria-label="作成日">
                    <span>日</span>
                  </div>
                </div>
              </td>
            </tr>
          </tbody>
        </table>

        <table class="items" id="itemsTable">
          <colgroup>
            <col style="width: 3%"><col style="width: 15%"><col style="width: 7%"><col style="width: 14%">
            <col style="width: 13%"><col style="width: 19%"><col style="width: 10%"><col style="width: 5%">
            <col style="width: 7%"><col style="width: 7%">
          </colgroup>
          <thead>
            <tr>
              <th></th>
              <th>設置場所</th>
              <th>メーカー</th>
              <th>型　　式</th>
              <th>製造No</th>
              <th>部　品　名</th>
              <th>部品番号</th>
              <th>数量</th>
              <th>仕入金額</th>
              <th>売上金額</th>
            </tr>
          </thead>
          <tbody id="itemRows"></tbody>
        </table>

        <table>
          <tbody>
            <tr>
              <td class="notes">
                <div class="notes-box">
                  <div class="notes-title">《連絡事項》</div>
                  <textarea class="entry" data-key="notes" aria-label="連絡事項"></textarea>
                  <div class="repair-time">【修理時間】　<input class="entry" style="width: 52px; height: 24px;" data-key="workers" aria-label="人数">人　×　（　<input class="entry" style="width: 70px; height: 24px;" data-key="hours" aria-label="時間">時間　　　<input class="entry" style="width: 52px; height: 24px;" data-key="days" aria-label="日数">日）</div>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

    <section class="view" id="savedView" hidden>
      <div class="list-panel">
        <h2>保存した見積もり</h2>
        <div id="savedList"></div>
      </div>
    </section>

    <section class="view" id="draftView" hidden>
      <div class="list-panel">
        <h2>未保存</h2>
        <div id="draftList"></div>
      </div>
    </section>

    <section class="view" id="candidateView" hidden>
      <div class="list-panel">
        <h2>候補一覧</h2>
        <div id="candidateTabs" style="display:flex; gap:8px; align-items:center; margin-bottom:8px; flex-wrap:wrap;">
          <button class="active" type="button" data-candidate-key="user_name">ユーザー名</button>
          <button type="button" data-candidate-key="property_name">物件名</button>
          <button type="button" data-candidate-key="items.maker">メーカー</button>
        </div>
        <div id="makerCandidateTabs" style="display:none; gap:8px; align-items:center; margin-bottom:12px; flex-wrap:wrap;">
          <button type="button" data-candidate-key="items.model">型式</button>
          <button type="button" data-candidate-key="items.part">部品名</button>
          <button type="button" data-candidate-key="items.part_no">部品番号</button>
        </div>
        <div style="display:flex; gap:8px; align-items:center; margin-bottom:12px; flex-wrap:wrap;">
          <input id="candidateText" style="min-height:36px; padding:0 8px; min-width:220px;" placeholder="候補に追加する文字">
          <button id="candidateAddBtn" type="button">候補追加</button>
        </div>
        <div id="candidateList"></div>
      </div>
    </section>

    <section class="view" id="trashView" hidden>
      <div class="list-panel">
        <h2>ゴミ箱</h2>
        <div id="trashList"></div>
      </div>
    </section>
  </main>

  <div class="confirm-backdrop" id="clearConfirm" hidden>
    <div class="confirm-box" role="dialog" aria-modal="true" aria-labelledby="clearConfirmTitle">
      <p id="clearConfirmTitle">入力内容を全部消しますか？</p>
      <div class="confirm-actions">
        <button id="clearNoBtn" type="button">いいえ</button>
        <button class="danger" id="clearYesBtn" type="button">はい</button>
      </div>
    </div>
  </div>
  <div class="confirm-backdrop" id="candidateDeleteConfirm" hidden>
    <div class="confirm-box" role="dialog" aria-modal="true" aria-labelledby="candidateDeleteTitle">
      <p id="candidateDeleteTitle">この候補を削除しますか？</p>
      <div class="confirm-actions">
        <button id="candidateDeleteNoBtn" type="button">いいえ</button>
        <button class="danger" id="candidateDeleteYesBtn" type="button">はい</button>
      </div>
    </div>
  </div>
  <script>
    const STORAGE_KEY = "mitsumori_irai_records_v2";
    const DRAFT_KEY = "mitsumori_irai_drafts_v2";
    const TRASH_KEY = "mitsumori_irai_trash_v2";
    const HISTORY_KEY = "mitsumori_irai_input_history_v1";
    const PART_NUMBER_KEY = "mitsumori_irai_part_number_map_v1";
    const MAKER_MODEL_KEY = "mitsumori_irai_maker_model_map_v1";
    const MAKER_MODEL_PART_KEY = "mitsumori_irai_maker_model_part_map_v1";
    const CANDIDATE_TRASH_KEY = "mitsumori_irai_candidate_trash_v1";
    const itemRows = document.getElementById("itemRows");
    const columns = ["place", "maker", "model", "serial", "part", "part_no", "qty", "cost", "price"];
    let activeId = null;
    let activeDraftId = null;
    let lastSavedJson = "";
    let activeInput = null;
    let pendingCandidateDelete = null;
    let activeCandidateKey = "user_name";

    function makeRow(index) {
      const tr = document.createElement("tr");
      tr.innerHTML = `<td class="row-number">${index + 1}</td>` + columns.map((name) =>
        `<td><input class="entry" data-key="items.${index}.${name}" aria-label="${name}"></td>`
      ).join("");
      return tr;
    }

    function renderRows(count) {
      itemRows.innerHTML = "";
      for (let i = 0; i < count; i += 1) itemRows.appendChild(makeRow(i));
    }

    function valuesToRows(data) {
      const count = Math.max(1, Number(data.rowCount || 14));
      return Array.from({ length: count }, (_, index) => {
        const row = {};
        columns.forEach((name) => { row[name] = data[`items.${index}.${name}`] || ""; });
        return row;
      });
    }

    function writeRows(rows) {
      renderRows(rows.length);
      rows.forEach((row, index) => {
        columns.forEach((name) => {
          const input = document.querySelector(`[data-key="items.${index}.${name}"]`);
          if (input) input.value = row[name] || "";
        });
      });
    }

    function fields() {
      return Array.from(document.querySelectorAll("#estimateView [data-key]"));
    }

    function readList(key) {
      try { return JSON.parse(localStorage.getItem(key) || "[]"); }
      catch { return []; }
    }

    function writeList(key, list) {
      localStorage.setItem(key, JSON.stringify(list));
    }

    function readHistory() {
      try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || "{}"); }
      catch { return {}; }
    }

    function writeHistory(history) {
      localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
    }

    function readPartNumberMap() {
      try { return JSON.parse(localStorage.getItem(PART_NUMBER_KEY) || "{}"); }
      catch { return {}; }
    }

    function writePartNumberMap(map) {
      localStorage.setItem(PART_NUMBER_KEY, JSON.stringify(map));
    }

    function readMakerModelMap() {
      try { return JSON.parse(localStorage.getItem(MAKER_MODEL_KEY) || "{}"); }
      catch { return {}; }
    }

    function writeMakerModelMap(map) {
      localStorage.setItem(MAKER_MODEL_KEY, JSON.stringify(map));
    }

    function readMakerModelPartMap() {
      try { return JSON.parse(localStorage.getItem(MAKER_MODEL_PART_KEY) || "{}"); }
      catch { return {}; }
    }

    function writeMakerModelPartMap(map) {
      localStorage.setItem(MAKER_MODEL_PART_KEY, JSON.stringify(map));
    }

    function partMapKey(model, part) {
      return `${String(model || "").trim()}|||${String(part || "").trim()}`;
    }

    function makerModelKey(maker, model) {
      return `${String(maker || "").trim()}|||${String(model || "").trim()}`;
    }

    function addUnique(list, value) {
      const text = String(value || "").trim();
      if (!text) return list || [];
      return [text, ...(list || []).filter((item) => item !== text)].slice(0, 80);
    }

    function historyKey(rawKey) {
      return rawKey.replace(/^items\.\d+\./, "items.");
    }

    function shouldUseHistory(rawKey) {
      const key = historyKey(rawKey);
      return [
        "user_name",
        "property_name",
        "items.maker",
        "items.model",
        "items.part",
        "items.part_no",
      ].includes(key);
    }

    function candidateLabel(key) {
      const labels = {
        user_name: "ユーザー名",
        property_name: "物件名",
        "items.maker": "メーカー",
        "items.model": "型式",
        "items.part": "部品名",
        "items.part_no": "部品番号",
      };
      return labels[key] || key;
    }

    function readingFor(value) {
      const dictionary = {
        "三菱": "みつびし",
        "三菱電機": "みつびしでんき",
        "ダイキン": "だいきん",
        "日立": "ひたち",
        "東芝": "とうしば",
        "パナソニック": "ぱなそにっく",
        "パナ": "ぱな",
        "シャープ": "しゃーぷ",
        "富士通": "ふじつう",
        "三洋": "さんよう",
        "川本": "かわもと",
        "荏原": "えばら",
        "テラル": "てらる",
      };
      return dictionary[value] || "";
    }

    function rememberValue(key, value) {
      const text = String(value || "").trim();
      if (!text) return;
      if (!shouldUseHistory(key)) return;
      const normalizedKey = historyKey(key);
      const history = readHistory();
      const list = history[normalizedKey] || [];
      history[normalizedKey] = [text, ...list.filter((item) => item !== text)].slice(0, 40);
      writeHistory(history);
    }

    function forgetValue(key, value) {
      const text = String(value || "").trim();
      if (!text || !shouldUseHistory(key)) return;
      const normalizedKey = historyKey(key);
      const history = readHistory();
      history[normalizedKey] = (history[normalizedKey] || []).filter((item) => item !== text);
      writeHistory(history);
    }

    function addCurrentCandidate() {
      if (!activeInput || !activeInput.dataset.key) return;
      rememberValue(activeInput.dataset.key, activeInput.value);
      showSuggestions(activeInput);
    }

    function deleteCurrentCandidate() {
      if (!activeInput || !activeInput.dataset.key) return;
      const visibleSuggestion = document.querySelector("#suggestBox:not([hidden]) [data-suggest]");
      const currentValue = String(activeInput.value || "").trim();
      const history = readHistory()[historyKey(activeInput.dataset.key)] || [];
      const target = history.includes(currentValue)
        ? currentValue
        : visibleSuggestion?.dataset.suggest;
      forgetValue(activeInput.dataset.key, target);
      showSuggestions(activeInput);
    }

    function rememberData(data) {
      Object.entries(data).forEach(([key, value]) => {
        if (key !== "rowCount") rememberValue(key, value);
      });
      rememberPartNumbers(data);
      rememberMakerModels(data);
    }

    function rememberMakerModels(data) {
      const map = readMakerModelMap();
      const partMap = readMakerModelPartMap();
      valuesToRows(data).forEach((row) => {
        const maker = String(row.maker || "").trim();
        const model = String(row.model || "").trim();
        const part = String(row.part || "").trim();
        if (!maker || !model) return;
        map[maker] = addUnique(map[maker], model);
        if (part) {
          const key = makerModelKey(maker, model);
          partMap[key] = addUnique(partMap[key], part);
        }
      });
      writeMakerModelMap(map);
      writeMakerModelPartMap(partMap);
    }

    function rememberPartNumbers(data) {
      const map = readPartNumberMap();
      valuesToRows(data).forEach((row) => {
        const model = String(row.model || "").trim();
        const part = String(row.part || "").trim();
        const partNo = String(row.part_no || "").trim();
        if (!model || !part || !partNo) return;
        map[partMapKey(model, part)] = partNo;
      });
      writePartNumberMap(map);
    }

    function rowIndexFromKey(key) {
      const match = /^items\.(\d+)\./.exec(key || "");
      return match ? Number(match[1]) : null;
    }

    function fillPartNumberForPartInput(input) {
      if (!input || !/^items\.\d+\.part$/.test(input.dataset.key || "")) return;
      const index = rowIndexFromKey(input.dataset.key);
      if (index === null) return;
      const model = document.querySelector(`[data-key="items.${index}.model"]`)?.value;
      const part = input.value;
      const partNo = readPartNumberMap()[partMapKey(model, part)];
      if (!partNo) return;
      const partNoInput = document.querySelector(`[data-key="items.${index}.part_no"]`);
      if (partNoInput && !partNoInput.value.trim()) {
        partNoInput.value = partNo;
        partNoInput.dispatchEvent(new Event("input", { bubbles: true }));
      }
    }

    function suggestionsFor(key, typed) {
      const list = readHistory()[historyKey(key)] || [];
      if (!shouldUseHistory(key)) return [];
      const query = String(typed || "").trim();
      if (!query) return list.slice(0, 8);
      return list.filter((item) =>
        item !== query && (item.includes(query) || readingFor(item).startsWith(query))
      ).slice(0, 8);
    }

    function showSuggestions(input) {
      const box = document.getElementById("suggestBox");
      const options = suggestionsFor(input.dataset.key, input.value);
      if (!options.length) {
        box.hidden = true;
        return;
      }
      box.innerHTML = options.map((option) =>
        `<button class="suggest-option" type="button" data-suggest="${escapeHtml(option)}">${escapeHtml(option)}</button>`
      ).join("");
      box.hidden = false;
      box.dataset.targetKey = input.dataset.key;
      fitMobileSheet();
    }

    function hideSuggestions() {
      const box = document.getElementById("suggestBox");
      box.hidden = true;
      fitMobileSheet();
    }

    function chooseSuggestion(button) {
      if (!button) return;
      const box = document.getElementById("suggestBox");
      const key = box.dataset.targetKey;
      const input = document.querySelector(`[data-key="${key}"]`);
      if (!input) return;
      input.value = button.dataset.suggest;
      input.dispatchEvent(new Event("input", { bubbles: true }));
      fillPartNumberForPartInput(input);
      hideSuggestions();
      input.focus();
    }

    function renderCandidateList() {
      const target = document.getElementById("candidateList");
      const history = readHistory();
      const values = history[activeCandidateKey] || [];
      const rows = values.map((value) => ({ key: activeCandidateKey, value }));
      document.querySelectorAll("[data-candidate-key]").forEach((button) => {
        button.classList.toggle("active", button.dataset.candidateKey === activeCandidateKey);
      });
      document.getElementById("makerCandidateTabs").style.display =
        activeCandidateKey === "items.maker" || ["items.model", "items.part", "items.part_no"].includes(activeCandidateKey)
          ? "flex"
          : "none";
      if (!rows.length) {
        target.innerHTML = `<div class="empty">${candidateLabel(activeCandidateKey)}の候補はまだありません</div>`;
        return;
      }
      target.innerHTML = `
        <table class="record-table">
          <thead><tr><th>項目</th><th>候補</th><th>操作</th></tr></thead>
          <tbody>
            ${rows.map((row) => `
              <tr>
                <td>${escapeHtml(candidateLabel(row.key))}</td>
                <td>${row.key === "items.maker"
                  ? `<button type="button" data-action="showMakerModels" data-maker="${escapeHtml(row.value)}">${escapeHtml(row.value)}</button>`
                  : escapeHtml(row.value)}</td>
                <td><button class="danger" type="button" data-action="askCandidateDelete" data-key="${escapeHtml(row.key)}" data-value="${escapeHtml(row.value)}">削除</button></td>
              </tr>
            `).join("")}
          </tbody>
        </table>`;
    }

    function showModelsForMaker(maker) {
      const models = readMakerModelMap()[maker] || [];
      activeCandidateKey = "items.model";
      document.querySelectorAll("[data-candidate-key]").forEach((button) => {
        button.classList.toggle("active", button.dataset.candidateKey === activeCandidateKey);
      });
      document.getElementById("makerCandidateTabs").style.display = "flex";
      const target = document.getElementById("candidateList");
      if (!models.length) {
        target.innerHTML = `<div class="empty">${escapeHtml(maker)}の型式候補はまだありません</div>`;
        return;
      }
      target.innerHTML = `
        <table class="record-table">
          <thead><tr><th>メーカー</th><th>型式</th><th>操作</th></tr></thead>
          <tbody>
            ${models.map((model) => `
              <tr>
                <td>${escapeHtml(maker)}</td>
                <td>${escapeHtml(model)}</td>
                <td><button class="danger" type="button" data-action="askMakerModelDelete" data-maker="${escapeHtml(maker)}" data-value="${escapeHtml(model)}">削除</button></td>
              </tr>
            `).join("")}
          </tbody>
        </table>`;
    }

    function addCandidateFromList() {
      const value = document.getElementById("candidateText").value;
      rememberValue(activeCandidateKey, value);
      document.getElementById("candidateText").value = "";
      renderCandidateList();
    }

    function selectCandidateKey(key) {
      activeCandidateKey = key;
      renderCandidateList();
    }

    function askCandidateDelete(key, value) {
      pendingCandidateDelete = { key, value };
      document.getElementById("candidateDeleteTitle").textContent = `「${value}」を削除しますか？`;
      document.getElementById("candidateDeleteConfirm").hidden = false;
    }

    function closeCandidateDeleteConfirm() {
      document.getElementById("candidateDeleteConfirm").hidden = true;
      pendingCandidateDelete = null;
    }

    function confirmCandidateDelete() {
      if (pendingCandidateDelete) {
        const trash = readList(CANDIDATE_TRASH_KEY);
        trash.unshift({
          ...pendingCandidateDelete,
          label: candidateLabel(pendingCandidateDelete.key),
          deletedAt: nowText(),
        });
        writeList(CANDIDATE_TRASH_KEY, trash);
        forgetValue(pendingCandidateDelete.key, pendingCandidateDelete.value);
        renderCandidateList();
      }
      closeCandidateDeleteConfirm();
    }

    function deleteMakerModel(maker, model) {
      const map = readMakerModelMap();
      map[maker] = (map[maker] || []).filter((item) => item !== model);
      writeMakerModelMap(map);
      const trash = readList(CANDIDATE_TRASH_KEY);
      trash.unshift({
        key: "items.model",
        value: model,
        label: `型式（${maker}）`,
        deletedAt: nowText(),
      });
      writeList(CANDIDATE_TRASH_KEY, trash);
      showModelsForMaker(maker);
    }

    function moveCaretToEnd(input) {
      if (!input || typeof input.setSelectionRange !== "function") return;
      const length = input.value.length;
      requestAnimationFrame(() => {
        try { input.setSelectionRange(length, length); } catch {}
      });
    }

    function collect() {
      const data = {};
      fields().forEach((el) => { data[el.dataset.key] = el.value; });
      data.rowCount = itemRows.children.length;
      return data;
    }

    function apply(data) {
      renderRows(Math.max(1, Number(data.rowCount || 14)));
      fields().forEach((el) => { el.value = data[el.dataset.key] || ""; });
    }

    function dataJson(data) {
      return JSON.stringify(data || collect());
    }

    function hasContent(data) {
      return Object.entries(data).some(([key, value]) => key !== "rowCount" && String(value || "").trim() !== "");
    }

    function updatePrimaryButtons() {
      const hasAnyContent = hasContent(collect());
      document.getElementById("saveBtn").disabled = !hasAnyContent;
      document.getElementById("newBtn").disabled = !hasAnyContent;
    }

    function markClean(data = collect()) {
      lastSavedJson = dataJson(data);
    }

    function saveCurrentDraft() {
      const data = collect();
      if (!hasContent(data) || dataJson(data) === lastSavedJson) return null;
      const drafts = readList(DRAFT_KEY);
      const id = activeDraftId || `d_${Date.now()}`;
      const record = { id, title: titleFor(data), company: companyFor(data), updatedAt: nowText(), data };
      const index = drafts.findIndex((item) => item.id === id);
      if (index >= 0) drafts[index] = record;
      else drafts.unshift(record);
      activeDraftId = id;
      writeList(DRAFT_KEY, drafts);
      renderRecordList("draft");
      return id;
    }

    function removeDraft(id) {
      if (!id) return;
      writeList(DRAFT_KEY, readList(DRAFT_KEY).filter((item) => item.id !== id));
      if (activeDraftId === id) activeDraftId = null;
      renderRecordList("draft");
    }

    function deleteRow(index = itemRows.children.length - 1) {
      const current = collect();
      const rows = valuesToRows(current);
      if (rows.length <= 1 || index < 0) return;
      rows.splice(index, 1);
      Object.keys(current).forEach((key) => {
        if (key.startsWith("items.")) delete current[key];
      });
      current.rowCount = rows.length;
      apply(current);
      writeRows(rows);
      fitMobileSheet();
      fitPrintRows();
      updatePrimaryButtons();
    }

    function fitPrintRows() {
      const rowCount = itemRows.children.length;
      const compact = rowCount > 14;
      const dense = rowCount > 18;
      document.documentElement.style.setProperty("--print-item-row-height", `${dense ? 19 : compact ? 22 : 27}px`);
      document.documentElement.style.setProperty("--print-item-header-height", `${dense ? 20 : compact ? 22 : 24}px`);
      document.documentElement.style.setProperty("--print-notes-height", `${dense ? 56 : compact ? 68 : 85}px`);
      document.documentElement.style.setProperty("--print-font-size", `${dense ? 9 : compact ? 10 : 11}px`);
    }

    function titleFor(data) {
      return data.user_name || data.recipient || data["items.0.part"] || "無題の見積もり";
    }

    function companyFor(data) {
      return data.user_name || data.recipient || "会社名未入力";
    }

    function nowText() {
      const d = new Date();
      const pad = (n) => String(n).padStart(2, "0");
      return `${d.getFullYear()}/${pad(d.getMonth() + 1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    function showView(name) {
      if (name !== "estimate") saveCurrentDraft();
      document.querySelectorAll(".view").forEach((view) => { view.hidden = true; });
      document.getElementById(`${name}View`).hidden = false;
      document.querySelectorAll("[data-view-button]").forEach((button) => {
        button.classList.toggle("active", button.dataset.viewButton === name);
      });
      if (name === "draft") renderRecordList("draft");
      if (name === "saved") renderRecordList("saved");
      if (name === "candidate") renderCandidateList();
      if (name === "trash") renderRecordList("trash");
    }

    function saveRecord() {
      if (!hasContent(collect())) return;
      const records = readList(STORAGE_KEY);
      const data = collect();
      rememberData(data);
      const id = activeId || `q_${Date.now()}`;
      const record = { id, title: titleFor(data), company: companyFor(data), updatedAt: nowText(), data };
      const index = records.findIndex((item) => item.id === id);
      if (index >= 0) records[index] = record;
      else records.unshift(record);
      activeId = id;
      removeDraft(activeDraftId);
      activeDraftId = null;
      markClean(data);
      writeList(STORAGE_KEY, records);
      renderRecordList("saved");
    }

    function newRecord() {
      if (!hasContent(collect())) return;
      saveCurrentDraft();
      activeId = null;
      activeDraftId = null;
      apply({ rowCount: 14 });
      markClean({ rowCount: 14 });
      updatePrimaryButtons();
      showView("estimate");
    }

    function loadRecord(id) {
      const record = readList(STORAGE_KEY).find((item) => item.id === id);
      if (!record) return;
      activeId = record.id;
      activeDraftId = null;
      apply(record.data);
      markClean(record.data);
      updatePrimaryButtons();
      showView("estimate");
    }

    function loadDraft(id) {
      const record = readList(DRAFT_KEY).find((item) => item.id === id);
      if (!record) return;
      activeId = null;
      activeDraftId = record.id;
      apply(record.data);
      markClean(record.data);
      updatePrimaryButtons();
      showView("estimate");
    }

    function moveToTrash(id) {
      const records = readList(STORAGE_KEY);
      const index = records.findIndex((item) => item.id === id);
      if (index < 0) return;
      const [record] = records.splice(index, 1);
      const trash = readList(TRASH_KEY);
      trash.unshift({ ...record, deletedAt: nowText() });
      writeList(STORAGE_KEY, records);
      writeList(TRASH_KEY, trash);
      if (activeId === id) activeId = null;
      renderRecordList("saved");
    }

    function restoreRecord(id) {
      const trash = readList(TRASH_KEY);
      const index = trash.findIndex((item) => item.id === id);
      if (index < 0) return;
      const [record] = trash.splice(index, 1);
      const records = readList(STORAGE_KEY);
      records.unshift(record);
      writeList(TRASH_KEY, trash);
      writeList(STORAGE_KEY, records);
      renderRecordList("trash");
    }

    function deleteForever(id) {
      writeList(TRASH_KEY, readList(TRASH_KEY).filter((item) => item.id !== id));
      renderRecordList("trash");
    }

    function fitMobileSheet() {
      const estimateView = document.getElementById("estimateView");
      const sheet = document.getElementById("sheet");
      const wrap = document.querySelector(".wrap");
      const shouldFit = window.matchMedia("(max-width: 1180px), (pointer: coarse)").matches;
      if (!shouldFit) {
        document.documentElement.style.setProperty("--sheet-scale", "1");
        estimateView.style.minHeight = "";
        wrap.style.overflowX = "";
        wrap.style.overflowY = "";
        return;
      }
      const toolbar = document.querySelector(".toolbar");
      const availableWidth = Math.max(320, window.innerWidth - 20);
      const availableHeight = Math.max(260, window.innerHeight - toolbar.getBoundingClientRect().height - 20);
      const baseWidth = 1120;
      const baseHeight = sheet.scrollHeight;
      const fitWidth = availableWidth / baseWidth;
      const fitHeight = availableHeight / baseHeight;
      const isLandscape = window.innerWidth > window.innerHeight;
      const readableFloor = window.innerWidth >= 700 ? 0.68 : 0.46;
      const scale = isLandscape
        ? Math.min(1, fitWidth)
        : Math.min(1, Math.max(fitWidth, readableFloor));
      document.documentElement.style.setProperty("--sheet-scale", String(scale));
      estimateView.style.minHeight = `${Math.ceil(sheet.scrollHeight * scale)}px`;
      wrap.style.overflowX = isLandscape ? "hidden" : "auto";
      wrap.style.overflowY = "auto";
    }

    function openClearConfirm() {
      document.getElementById("clearConfirm").hidden = false;
    }

    function closeClearConfirm() {
      document.getElementById("clearConfirm").hidden = true;
    }

    function renderRecordList(kind) {
      const isTrash = kind === "trash";
      const isDraft = kind === "draft";
      const target = document.getElementById(isTrash ? "trashList" : isDraft ? "draftList" : "savedList");
      const list = readList(isTrash ? TRASH_KEY : isDraft ? DRAFT_KEY : STORAGE_KEY);
      if (!list.length) {
        target.innerHTML = isTrash ? renderCandidateTrashHtml(true) : `<div class="empty">${isDraft ? "未保存の見積もりはありません" : "保存した見積もりはありません"}</div>`;
        return;
      }
      target.innerHTML = `
        <table class="record-table">
          <thead><tr><th>会社名</th><th>${isTrash ? "削除日時" : isDraft ? "退避日時" : "保存日時"}</th><th>操作</th></tr></thead>
          <tbody>
            ${list.map((record) => `
              <tr>
                <td>${escapeHtml(record.company || record.title)}</td>
                <td>${escapeHtml(isTrash ? record.deletedAt : record.updatedAt)}</td>
                <td>
                  ${isTrash
                    ? `<button type="button" data-action="restore" data-id="${record.id}">復元</button>
                       <button class="danger" type="button" data-action="delete" data-id="${record.id}">完全削除</button>`
                    : isDraft
                    ? `<button type="button" data-action="openDraft" data-id="${record.id}">開く</button>
                       <button class="danger" type="button" data-action="deleteDraft" data-id="${record.id}">削除</button>`
                    : `<button type="button" data-action="open" data-id="${record.id}">開く</button>
                       <button class="danger" type="button" data-action="trash" data-id="${record.id}">ゴミ箱へ</button>`}
                </td>
              </tr>
            `).join("")}
          </tbody>
        </table>${isTrash ? renderCandidateTrashHtml(false) : ""}`;
    }

    function renderCandidateTrashHtml(showEmptyWhenNoRecords) {
      const list = readList(CANDIDATE_TRASH_KEY);
      if (!list.length) {
        return showEmptyWhenNoRecords ? `<div class="empty">ゴミ箱は空です</div>` : "";
      }
      return `
        <h2 style="margin-top:18px;">削除した候補</h2>
        <table class="record-table">
          <thead><tr><th>項目</th><th>候補</th><th>削除日時</th></tr></thead>
          <tbody>
            ${list.map((item) => `
              <tr>
                <td>${escapeHtml(item.label || candidateLabel(item.key))}</td>
                <td>${escapeHtml(item.value)}</td>
                <td>${escapeHtml(item.deletedAt)}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>`;
    }

    function escapeHtml(text) {
      return String(text || "").replace(/[&<>"']/g, (ch) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;"
      }[ch]));
    }

    document.querySelectorAll("[data-view-button]").forEach((button) => {
      button.addEventListener("click", () => showView(button.dataset.viewButton));
    });

    document.getElementById("saveBtn").addEventListener("click", saveRecord);
    document.getElementById("newBtn").addEventListener("click", newRecord);
    document.getElementById("printBtn").addEventListener("click", () => window.print());
    document.getElementById("addRowBtn").addEventListener("click", () => {
      const data = collect();
      renderRows(itemRows.children.length + 1);
      apply({ ...data, rowCount: itemRows.children.length });
      fitMobileSheet();
      fitPrintRows();
      updatePrimaryButtons();
    });
    document.getElementById("removeRowBtn").addEventListener("click", () => {
      deleteRow();
    });
    document.getElementById("clearBtn").addEventListener("click", () => {
      openClearConfirm();
    });
    document.getElementById("clearNoBtn").addEventListener("click", closeClearConfirm);
    document.getElementById("clearYesBtn").addEventListener("click", () => {
      fields().forEach((el) => { el.value = ""; });
      closeClearConfirm();
      updatePrimaryButtons();
    });

    document.getElementById("estimateView").addEventListener("input", (event) => {
      updatePrimaryButtons();
      if (event.target.matches("[data-key]")) {
        activeInput = event.target;
        moveCaretToEnd(event.target);
        showSuggestions(event.target);
        fillPartNumberForPartInput(event.target);
      }
    });

    document.getElementById("estimateView").addEventListener("focusin", (event) => {
      if (event.target.matches("[data-key]")) {
        activeInput = event.target;
        hideSuggestions();
      }
    });

    document.getElementById("estimateView").addEventListener("focusout", (event) => {
      setTimeout(() => {
        const box = document.getElementById("suggestBox");
        if (box.matches(":hover") || box.contains(document.activeElement)) return;
        hideSuggestions();
      }, 800);
    });

    document.getElementById("suggestBox").addEventListener("pointerdown", (event) => {
      const button = event.target.closest("[data-suggest]");
      if (!button) return;
      event.preventDefault();
      chooseSuggestion(button);
    });

    document.getElementById("suggestBox").addEventListener("touchstart", (event) => {
      const button = event.target.closest("[data-suggest]");
      if (!button) return;
      event.preventDefault();
      chooseSuggestion(button);
    }, { passive: false });

    document.getElementById("suggestBox").addEventListener("click", (event) => {
      const button = event.target.closest("[data-suggest]");
      if (!button) return;
      chooseSuggestion(button);
    });

    document.getElementById("candidateAddBtn").addEventListener("click", addCandidateFromList);
    document.getElementById("candidateView").addEventListener("click", (event) => {
      const button = event.target.closest("[data-candidate-key]");
      if (!button) return;
      selectCandidateKey(button.dataset.candidateKey);
    });
    document.getElementById("candidateDeleteNoBtn").addEventListener("click", closeCandidateDeleteConfirm);
    document.getElementById("candidateDeleteYesBtn").addEventListener("click", confirmCandidateDelete);
    document.getElementById("candidateList").addEventListener("click", (event) => {
      const button = event.target.closest("button[data-action]");
      if (!button) return;
      if (button.dataset.action === "askCandidateDelete") {
        askCandidateDelete(button.dataset.key, button.dataset.value);
      }
    });

    document.getElementById("savedList").addEventListener("click", (event) => {
      const button = event.target.closest("button[data-action]");
      if (!button) return;
      if (button.dataset.action === "open") loadRecord(button.dataset.id);
      if (button.dataset.action === "trash") moveToTrash(button.dataset.id);
    });

    document.getElementById("draftList").addEventListener("click", (event) => {
      const button = event.target.closest("button[data-action]");
      if (!button) return;
      if (button.dataset.action === "openDraft") loadDraft(button.dataset.id);
      if (button.dataset.action === "deleteDraft") removeDraft(button.dataset.id);
    });

    document.getElementById("trashList").addEventListener("click", (event) => {
      const button = event.target.closest("button[data-action]");
      if (!button) return;
      if (button.dataset.action === "restore") restoreRecord(button.dataset.id);
      if (button.dataset.action === "delete") deleteForever(button.dataset.id);
    });

    window.addEventListener("beforeprint", fitPrintRows);

    renderRows(14);
    renderRecordList("saved");
    renderRecordList("draft");
    renderCandidateList();
    renderRecordList("trash");
    markClean({ rowCount: 14 });
    showView("estimate");
    fitMobileSheet();
    fitPrintRows();
    updatePrimaryButtons();
    window.addEventListener("resize", fitMobileSheet);
    window.addEventListener("orientationchange", fitMobileSheet);
  </script>
</body>
</html>

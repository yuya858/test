  </div>
  <script>
    const STORAGE_KEY = "mitsumori_irai_records_v2";
    const DRAFT_KEY = "mitsumori_irai_drafts_v2";
    const TRASH_KEY = "mitsumori_irai_trash_v2";
    const HISTORY_KEY = "mitsumori_irai_input_history_v1";
    const PART_NUMBER_KEY = "mitsumori_irai_part_number_map_v1";
    const MAKER_MODEL_KEY = "mitsumori_irai_maker_model_map_v1";
    const MAKER_MODEL_PART_KEY = "mitsumori_irai_maker_model_part_map_v1";
    const CANDIDATE_TRASH_KEY = "mitsumori_irai_candidate_trash_v1";
    const SUPABASE_URL = "https://tkhcbtcvtzkruporhnhw.supabase.co";
    const SUPABASE_KEY = "sb_publishable_BjUiMlNsWkuEFSlhLNf-Yg_QBhEe87N";
    const CLOUD_TABLE = "mitsumori_app_state";
    const CLOUD_ROW_ID = "shared";
    const CLOUD_KEYS = [
      STORAGE_KEY,
      DRAFT_KEY,
      TRASH_KEY,
      HISTORY_KEY,
      PART_NUMBER_KEY,
      MAKER_MODEL_KEY,
      MAKER_MODEL_PART_KEY,
      CANDIDATE_TRASH_KEY,
    ];
    const itemRows = document.getElementById("itemRows");
    const columns = ["place", "maker", "model", "serial", "part", "part_no", "qty", "cost", "price"];
    let activeId = null;
    let activeDraftId = null;
    let lastSavedJson = "";
    let activeInput = null;
    let pendingCandidateDelete = null;
    let pendingPermanentDelete = null;
    let activeCandidateKey = "user_name";
    let activeCandidateMaker = "";
    let activeCandidateModel = "";
    let selectedCandidateParts = new Set();
    let selectedCandidateItem = null;
    let candidateAddMode = "";
    let candidateBulkAddConfirm = false;
    let candidateBackStack = [];
    let undoStack = [];
    let lastUndoSnapshot = "";
    let cloudSyncPaused = false;
    let cloudSaveTimer = null;

    function makeRow(index) {
      const tr = document.createElement("tr");
      tr.innerHTML = `<td class="row-number">${index + 1}</td>` + columns.map((name) => {
        const noAutocomplete = name === "serial"
          ? ' autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false"'
          : "";
        return `<td><input class="entry" data-key="items.${index}.${name}" aria-label="${name}"${noAutocomplete}></td>`;
      }).join("");
      return tr;
    }

    function renderRows(count) {
      itemRows.innerHTML = "";
      for (let i = 0; i < count; i += 1) itemRows.appendChild(makeRow(i));
    }

    function valuesToRows(data) {
      const count = Math.max(1, Number(data.rowCount || 14));
      return Array.from({ length: count }, (_, index) => {
        const row = {};
        columns.forEach((name) => { row[name] = data[`items.${index}.${name}`] || ""; });
        return row;
      });
    }

    function writeRows(rows) {
      renderRows(rows.length);
      rows.forEach((row, index) => {
        columns.forEach((name) => {
          const input = document.querySelector(`[data-key="items.${index}.${name}"]`);
          if (input) input.value = row[name] || "";
        });
      });
    }

    function rowHasContent(row) {
      return columns.some((name) => String(row[name] || "").trim());
    }

    function rowsWithEffectiveContext(rows) {
      let currentPlace = "";
      let currentMaker = "";
      return rows.map((row) => {
        const place = String(row.place || "").trim();
        const maker = String(row.maker || "").trim();
        if (place && place !== currentPlace) {
          currentPlace = place;
          currentMaker = "";
        }
        if (maker) currentMaker = maker;
        return { ...row, effectivePlace: place || currentPlace, effectiveMaker: maker || currentMaker };
      });
    }

    function formatRowsForDisplay(rows) {
      const formatted = [];
      const formatSegment = (segment) => {
        const contextRows = rowsWithEffectiveContext(segment);
        const filled = contextRows.filter(rowHasContent);
        const emptyCount = segment.length - filled.length;
        const makerOrder = [];
        filled.forEach((row) => {
          const maker = String(row.effectiveMaker || row.maker || "").trim();
          if (maker && !makerOrder.includes(maker)) makerOrder.push(maker);
        });
        const makerRows = makerOrder.flatMap((maker) =>
          filled.filter((row) => String(row.effectiveMaker || row.maker || "").trim() === maker)
        );
        const noMakerRows = filled.filter((row) => !String(row.effectiveMaker || row.maker || "").trim());
        let previousMaker = "";
        return [...makerRows, ...noMakerRows].map((row) => {
          const maker = String(row.effectiveMaker || row.maker || "").trim();
          const displayMaker = maker && maker === previousMaker ? "" : maker;
          if (maker) previousMaker = maker;
          const { effectivePlace, effectiveMaker, ...cleanRow } = row;
          return { ...cleanRow, maker: displayMaker };
        }).concat(Array.from({ length: emptyCount }, () => ({})));
      };

      let start = 0;
      for (let i = 1; i < rows.length; i += 1) {
        if (String(rows[i].place || "").trim()) {
          formatted.push(...formatSegment(rows.slice(start, i)));
          start = i;
        }
      }
      formatted.push(...formatSegment(rows.slice(start)));
      return formatted;
    }

    function sortRowsByMaker() {
      writeRows(formatRowsForDisplay(valuesToRows(collect())));
    }

    function insertBlankRowAt(index) {
      const rows = valuesToRows(collect());
      const lastContentIndex = rows.reduce((last, row, rowIndex) => rowHasContent(row) ? rowIndex : last, -1);
      if (lastContentIndex >= rows.length - 1) rows.push({});
      rows.splice(index, 0, {});
      writeRows(rows.slice(0, Math.max(14, rows.length - 1)));
    }

    function activeRowIndex() {
      if (activeInput?.dataset?.key) {
        const index = rowIndexFromKey(activeInput.dataset.key);
        if (index !== null) return index;
      }
      return 0;
    }

    function firstMissingMakerPlace() {
      const rows = valuesToRows(collect());
      const row = rows.find((item) =>
        String(item.place || "").trim() &&
        rowHasContent(item) &&
        !String(item.maker || "").trim()
      );
      return row ? String(row.place || "").trim() : "";
    }

    function showMakerMissing(place) {
      document.getElementById("makerMissingTitle").textContent =
        `設置場所「${place}」にメーカーが書かれていません`;
      document.getElementById("makerMissingConfirm").hidden = false;
    }

    function closeMakerMissing() {
      document.getElementById("makerMissingConfirm").hidden = true;
    }

    function fields() {
      return Array.from(document.querySelectorAll("#estimateView [data-key]"));
    }

    function readList(key) {
      try { return JSON.parse(localStorage.getItem(key) || "[]"); }
      catch { return []; }
    }

    function writeList(key, list) {
      localStorage.setItem(key, JSON.stringify(list));
      scheduleCloudSave();
    }

    function readHistory() {
      try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || "{}"); }
      catch { return {}; }
    }

    function writeHistory(history) {
      localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
      scheduleCloudSave();
    }

    function readPartNumberMap() {
      try { return JSON.parse(localStorage.getItem(PART_NUMBER_KEY) || "{}"); }
      catch { return {}; }
    }

    function writePartNumberMap(map) {
      localStorage.setItem(PART_NUMBER_KEY, JSON.stringify(map));
      scheduleCloudSave();
    }

    function readMakerModelMap() {
      try { return JSON.parse(localStorage.getItem(MAKER_MODEL_KEY) || "{}"); }
      catch { return {}; }
    }

    function writeMakerModelMap(map) {
      localStorage.setItem(MAKER_MODEL_KEY, JSON.stringify(map));
      scheduleCloudSave();
    }

    function readMakerModelPartMap() {
      try { return JSON.parse(localStorage.getItem(MAKER_MODEL_PART_KEY) || "{}"); }
      catch { return {}; }
    }

    function writeMakerModelPartMap(map) {
      localStorage.setItem(MAKER_MODEL_PART_KEY, JSON.stringify(map));
      scheduleCloudSave();
    }

    function cloudHeaders(extra = {}) {
      return {
        apikey: SUPABASE_KEY,
        Authorization: `Bearer ${SUPABASE_KEY}`,
        "Content-Type": "application/json",
        ...extra,
      };
    }

    function cloudStateFromLocal() {
      const data = {};
      CLOUD_KEYS.forEach((key) => {
        try { data[key] = JSON.parse(localStorage.getItem(key) || "null"); }
        catch { data[key] = null; }
      });
      return data;
    }

    function mergeUniqueById(localList = [], cloudList = []) {
      const map = new Map();
      [...cloudList, ...localList].forEach((item) => {
        if (!item?.id) return;
        map.set(item.id, { ...(map.get(item.id) || {}), ...item });
      });
      return Array.from(map.values()).sort((a, b) =>
        String(b.updatedAt || b.deletedAt || "").localeCompare(String(a.updatedAt || a.deletedAt || ""))
      );
    }

    function mergeUniqueText(localList = [], cloudList = []) {
      return Array.from(new Set([...cloudList, ...localList].filter(Boolean))).slice(0, 80);
    }

    function mergeHistory(localHistory = {}, cloudHistory = {}) {
      const merged = { ...cloudHistory };
      Object.keys(localHistory).forEach((key) => {
        merged[key] = mergeUniqueText(localHistory[key] || [], cloudHistory[key] || []);
      });
      return merged;
    }

    function mergeObjectLists(localMap = {}, cloudMap = {}) {
      const merged = { ...cloudMap };
      Object.keys(localMap).forEach((key) => {
        if (Array.isArray(localMap[key]) || Array.isArray(cloudMap[key])) {
          merged[key] = mergeUniqueText(localMap[key] || [], cloudMap[key] || []);
        } else {
          merged[key] = localMap[key] ?? cloudMap[key];
        }
      });
      return merged;
    }

    function mergeCloudState(localData, cloudData) {
      return {
        [STORAGE_KEY]: mergeUniqueById(localData[STORAGE_KEY] || [], cloudData[STORAGE_KEY] || []),
        [DRAFT_KEY]: mergeUniqueById(localData[DRAFT_KEY] || [], cloudData[DRAFT_KEY] || []),
        [TRASH_KEY]: mergeUniqueById(localData[TRASH_KEY] || [], cloudData[TRASH_KEY] || []),
        [CANDIDATE_TRASH_KEY]: [...(cloudData[CANDIDATE_TRASH_KEY] || []), ...(localData[CANDIDATE_TRASH_KEY] || [])].slice(0, 200),
        [HISTORY_KEY]: mergeHistory(localData[HISTORY_KEY] || {}, cloudData[HISTORY_KEY] || {}),
        [PART_NUMBER_KEY]: { ...(cloudData[PART_NUMBER_KEY] || {}), ...(localData[PART_NUMBER_KEY] || {}) },
        [MAKER_MODEL_KEY]: mergeObjectLists(localData[MAKER_MODEL_KEY] || {}, cloudData[MAKER_MODEL_KEY] || {}),
        [MAKER_MODEL_PART_KEY]: mergeObjectLists(localData[MAKER_MODEL_PART_KEY] || {}, cloudData[MAKER_MODEL_PART_KEY] || {}),
      };
    }

    function applyCloudState(data) {
      cloudSyncPaused = true;
      CLOUD_KEYS.forEach((key) => {
        localStorage.setItem(key, JSON.stringify(data[key] ?? (key === HISTORY_KEY || key === PART_NUMBER_KEY || key === MAKER_MODEL_KEY || key === MAKER_MODEL_PART_KEY ? {} : [])));
      });
      cloudSyncPaused = false;
    }

    async function loadCloudState() {
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/${CLOUD_TABLE}?id=eq.${CLOUD_ROW_ID}&select=data&limit=1`, {
          headers: cloudHeaders(),
        });
        if (!res.ok) throw new Error(`cloud load ${res.status}`);
        const rows = await res.json();
        const localData = cloudStateFromLocal();
        const cloudData = rows[0]?.data || {};
        const merged = rows.length ? mergeCloudState(localData, cloudData) : localData;
        applyCloudState(merged);
        await saveCloudStateNow();
      } catch (error) {
        console.warn("Supabase sync disabled:", error);
      }
    }

    async function saveCloudStateNow() {
      try {
        await fetch(`${SUPABASE_URL}/rest/v1/${CLOUD_TABLE}`, {
          method: "POST",
          headers: cloudHeaders({ Prefer: "resolution=merge-duplicates" }),
          body: JSON.stringify({
            id: CLOUD_ROW_ID,
            data: cloudStateFromLocal(),
            updated_at: new Date().toISOString(),
          }),
        });
      } catch (error) {
        console.warn("Supabase save failed:", error);
      }
    }

    function scheduleCloudSave() {
      if (cloudSyncPaused) return;
      clearTimeout(cloudSaveTimer);
      cloudSaveTimer = setTimeout(saveCloudStateNow, 700);
    }

    function partMapKey(model, part) {
      return `${String(model || "").trim()}|||${String(part || "").trim()}`;
    }

    function partNumberKey(maker, model, part) {
      return `${String(maker || "").trim()}|||${String(model || "").trim()}|||${String(part || "").trim()}`;
    }

    function makerModelKey(maker, model) {
      return `${String(maker || "").trim()}|||${String(model || "").trim()}`;
    }

    function addUnique(list, value) {
      const text = String(value || "").trim();
      if (!text) return list || [];
      return [text, ...(list || []).filter((item) => item !== text)].slice(0, 80);
    }

    function historyKey(rawKey) {
      return rawKey.replace(/^items\.\d+\./, "items.");
    }

    function shouldUseHistory(rawKey) {
      const key = historyKey(rawKey);
      return [
        "user_name",
        "property_name",
        "items.maker",
        "items.model",
        "items.part",
        "items.part_no",
      ].includes(key);
    }

    function candidateLabel(key) {
      const labels = {
        user_name: "ユーザー名",
        property_name: "物件名",
        "items.maker": "メーカー",
        "items.model": "型式",
        "items.part": "部品名",
        "items.part_no": "部品番号",
      };
      return labels[key] || key;
    }

    function readingFor(value) {
      const dictionary = {
        "三菱": "みつびし",
        "三菱電機": "みつびしでんき",
        "ダイキン": "だいきん",
        "日立": "ひたち",
        "東芝": "とうしば",
        "パナソニック": "ぱなそにっく",
        "パナ": "ぱな",
        "シャープ": "しゃーぷ",
        "富士通": "ふじつう",
        "三洋": "さんよう",
        "川本": "かわもと",
        "荏原": "えばら",
        "テラル": "てらる",
      };
      return dictionary[value] || "";
    }

    function rememberValue(key, value) {
      const text = String(value || "").trim();
      if (!text) return;
      if (!shouldUseHistory(key)) return;
      const normalizedKey = historyKey(key);
      const history = readHistory();
      const list = history[normalizedKey] || [];
      history[normalizedKey] = [text, ...list.filter((item) => item !== text)].slice(0, 40);
      writeHistory(history);
    }

    function forgetValue(key, value) {
      const text = String(value || "").trim();
      if (!text || !shouldUseHistory(key)) return;
      const normalizedKey = historyKey(key);
      const history = readHistory();
      history[normalizedKey] = (history[normalizedKey] || []).filter((item) => item !== text);
      writeHistory(history);
    }

    function addCurrentCandidate() {
      if (!activeInput || !activeInput.dataset.key) return;
      rememberValue(activeInput.dataset.key, activeInput.value);
      showSuggestions(activeInput);
    }

    function deleteCurrentCandidate() {
      if (!activeInput || !activeInput.dataset.key) return;
      const visibleSuggestion = document.querySelector("#suggestBox:not([hidden]) [data-suggest]");
      const currentValue = String(activeInput.value || "").trim();
      const history = readHistory()[historyKey(activeInput.dataset.key)] || [];
      const target = history.includes(currentValue)
        ? currentValue
        : visibleSuggestion?.dataset.suggest;
      forgetValue(activeInput.dataset.key, target);
      showSuggestions(activeInput);
    }

    function rememberData(data) {
      Object.entries(data).forEach(([key, value]) => {
        if (key !== "rowCount") rememberValue(key, value);
      });
      rememberPartNumbers(data);
      rememberMakerModels(data);
      renderCandidateList();
    }

    function rememberMakerModels(data) {
      const map = readMakerModelMap();
      const partMap = readMakerModelPartMap();
      rowsWithEffectiveContext(valuesToRows(data)).forEach((row) => {
        const maker = String(row.effectiveMaker || row.maker || "").trim();
        const model = String(row.model || "").trim();
        const part = String(row.part || "").trim();
        if (!maker || !model) return;
        map[maker] = addUnique(map[maker], model);
        if (part) {
          const key = makerModelKey(maker, model);
          partMap[key] = addUnique(partMap[key], part);
        }
      });
      writeMakerModelMap(map);
      writeMakerModelPartMap(partMap);
    }

    function rememberPartNumbers(data) {
      const map = readPartNumberMap();
      rowsWithEffectiveContext(valuesToRows(data)).forEach((row) => {
        const maker = String(row.effectiveMaker || row.maker || "").trim();
        const model = String(row.model || "").trim();
        const part = String(row.part || "").trim();
        const partNo = String(row.part_no || "").trim();
        if (!model || !part || !partNo) return;
        if (maker) map[partNumberKey(maker, model, part)] = partNo;
        map[partMapKey(model, part)] = partNo;
      });
      writePartNumberMap(map);
    }

    function rowIndexFromKey(key) {
      const match = /^items\.(\d+)\./.exec(key || "");
      return match ? Number(match[1]) : null;
    }

    function rowContextFromKey(key) {
      const index = rowIndexFromKey(key);
      if (index === null) return { index: null, maker: "", model: "", part: "" };
      let place = document.querySelector(`[data-key="items.${index}.place"]`)?.value.trim() || "";
      let maker = document.querySelector(`[data-key="items.${index}.maker"]`)?.value.trim() || "";
      if (!maker) {
        for (let i = index - 1; i >= 0; i -= 1) {
          const previousPlace = document.querySelector(`[data-key="items.${i}.place"]`)?.value.trim() || "";
          if (!place && previousPlace) place = previousPlace;
          if (place && previousPlace && previousPlace !== place) break;
          const previousMaker = document.querySelector(`[data-key="items.${i}.maker"]`)?.value.trim() || "";
          if (previousMaker) {
            maker = previousMaker;
            break;
          }
        }
      }
      return {
        index,
        place,
        maker,
        model: document.querySelector(`[data-key="items.${index}.model"]`)?.value.trim() || "",
        part: document.querySelector(`[data-key="items.${index}.part"]`)?.value.trim() || "",
      };
    }

    function filterSuggestions(list, typed) {
      const query = String(typed || "").trim();
      const unique = Array.from(new Set((list || []).filter(Boolean)));
      if (!query) return unique.slice(0, 8);
      return unique.filter((item) =>
        item !== query && (item.includes(query) || readingFor(item).startsWith(query))
      ).slice(0, 8);
    }

    function partNumberForRow(maker, model, part) {
      const map = readPartNumberMap();
      return map[partNumberKey(maker, model, part)] || map[partMapKey(model, part)] || "";
    }

    function fillPartNumberForPartInput(input, force = false) {
      if (!input || !/^items\.\d+\.part$/.test(input.dataset.key || "")) return;
      const { index, maker, model } = rowContextFromKey(input.dataset.key);
      if (index === null) return;
      const part = input.value;
      const partNo = partNumberForRow(maker, model, part);
      if (!partNo) return;
      const partNoInput = document.querySelector(`[data-key="items.${index}.part_no"]`);
      if (partNoInput && (force || !partNoInput.value.trim())) {
        partNoInput.value = partNo;
        partNoInput.dispatchEvent(new Event("input", { bubbles: true }));
      }
    }

    function suggestionsFor(key, typed) {
      if (!shouldUseHistory(key)) return [];
      const normalizedKey = historyKey(key);
      const history = readHistory()[normalizedKey] || [];
      const { maker, model, part } = rowContextFromKey(key);
      let scoped = [];
      if (normalizedKey === "items.model" && maker) {
        scoped = readMakerModelMap()[maker] || [];
      }
      if (normalizedKey === "items.part" && maker && model) {
        scoped = readMakerModelPartMap()[makerModelKey(maker, model)] || [];
      }
      if (normalizedKey === "items.part_no" && model && part) {
        const partNo = partNumberForRow(maker, model, part);
        scoped = partNo ? [partNo] : [];
      }
      return filterSuggestions([...scoped, ...history], typed);
    }

    function showSuggestions(input) {
      const box = document.getElementById("suggestBox");
      const options = suggestionsFor(input.dataset.key, input.value);
      if (!options.length) {
        box.hidden = true;
        return;
      }
      box.innerHTML = options.map((option) =>
        `<button class="suggest-option" type="button" data-suggest="${escapeHtml(option)}">${escapeHtml(option)}</button>`
      ).join("");
      box.hidden = false;
      box.dataset.targetKey = input.dataset.key;
      fitMobileSheet();
    }

    function hideSuggestions() {
      const box = document.getElementById("suggestBox");
      box.hidden = true;
      fitMobileSheet();
    }

    function chooseSuggestion(button) {
      if (!button) return;
      const box = document.getElementById("suggestBox");
      const key = box.dataset.targetKey;
      const input = document.querySelector(`[data-key="${key}"]`);
      if (!input) return;
      rememberUndoState();
      input.value = button.dataset.suggest;
      input.dispatchEvent(new Event("input", { bubbles: true }));
      fillPartNumberForPartInput(input, true);
      hideSuggestions();
      input.focus();
    }

    function candidateSearchText() {
      return document.getElementById("candidateSearchInput")?.value.trim() || "";
    }

    function matchesCandidateSearch(values) {
      const query = candidateSearchText();
      if (!query) return true;
      return values.some((value) => String(value || "").includes(query));
    }

    function refreshCandidateView() {
      if (activeCandidateMaker && activeCandidateModel) {
        showPartsForMakerModel(activeCandidateMaker, activeCandidateModel, false);
      } else if (activeCandidateMaker) {
        showModelsForMaker(activeCandidateMaker, false);
      } else {
        renderCandidateList();
      }
    }

    function updateCandidateContext() {
      const target = document.getElementById("candidateContext");
      if (!target) return;
      if (activeCandidateMaker && activeCandidateModel) {
        target.textContent = `メーカー：${activeCandidateMaker}　型式：${activeCandidateModel}`;
      } else if (activeCandidateMaker) {
        target.textContent = `メーカー：${activeCandidateMaker}`;
      } else {
        target.textContent = "";
      }
    }

    function updateCandidateActionButtons() {
      const candidateText = document.getElementById("candidateText");
      const candidatePartNoText = document.getElementById("candidatePartNoText");
      const searchInput = document.getElementById("candidateSearchInput");
      const addBtn = document.getElementById("candidateAddBtn");
      const clearBtn = document.getElementById("candidateSearchClearBtn");
      const bulkAddBtn = document.getElementById("candidateBulkAddBtn");
      const editBtn = document.getElementById("candidateEditSelectedBtn");
      const deleteBtn = document.getElementById("candidateDeleteSelectedBtn");
      const selectedCount = selectedCandidateParts.size;
      const candidateValue = String(candidateText?.value || "").trim();
      const partNoValue = String(candidatePartNoText?.value || "").trim();
      const partMaker = candidateAddMakerValue();
      const partModel = candidateAddModelValue();
      if (addBtn) addBtn.disabled = candidateAddMode === "part"
        ? !(candidateValue && partNoValue && partMaker && partModel)
        : !(candidateAddMode === "maker" && candidateValue);
      if (clearBtn) clearBtn.disabled = !String(searchInput?.value || "").trim();
      const canBulkAdd = Boolean(activeCandidateMaker && activeCandidateModel && selectedCount > 0);
      if (!canBulkAdd) candidateBulkAddConfirm = false;
      if (bulkAddBtn) {
        bulkAddBtn.disabled = !canBulkAdd;
        bulkAddBtn.textContent = candidateBulkAddConfirm ? "✓" : "見積追加";
      }
      if (editBtn) editBtn.disabled = !(selectedCandidateItem || (activeCandidateMaker && activeCandidateModel && selectedCount === 1));
      if (deleteBtn) deleteBtn.disabled = !(selectedCandidateItem || (activeCandidateMaker && activeCandidateModel && selectedCount > 0));
    }

    function renderCandidateList() {
      const target = document.getElementById("candidateList");
      const history = readHistory();
      const values = history[activeCandidateKey] || [];
      const rows = values
        .map((value) => ({ key: activeCandidateKey, value }))
        .filter((row) => matchesCandidateSearch([candidateLabel(row.key), row.value]));
      document.querySelectorAll("[data-candidate-key]").forEach((button) => {
        button.classList.toggle("active", button.dataset.candidateKey === activeCandidateKey);
      });
      document.getElementById("makerCandidateTabs").style.display = "none";
      activeCandidateMaker = "";
      activeCandidateModel = "";
      selectedCandidateParts.clear();
      selectedCandidateItem = null;
      candidateBulkAddConfirm = false;
      updateCandidateContext();
      updateCandidateActionButtons();
      updateCandidateBackButton();
      if (!rows.length) {
        target.innerHTML = `<div class="empty">${candidateLabel(activeCandidateKey)}の候補はまだありません</div>`;
        return;
      }
      target.innerHTML = `
        <table class="record-table candidate-value-table">
          <thead><tr><th>項目</th><th>候補</th></tr></thead>
          <tbody>
            ${rows.map((row) => `
              <tr class="candidate-row" data-action="selectCandidateItem" data-type="history" data-key="${escapeHtml(row.key)}" data-value="${escapeHtml(row.value)}">
                <td data-label="項目">${escapeHtml(candidateLabel(row.key))}</td>
                <td data-label="候補">${row.key === "items.maker"
                  ? `<button type="button" data-action="showMakerModels" data-maker="${escapeHtml(row.value)}">${escapeHtml(row.value)}</button>`
                  : escapeHtml(row.value)}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>`;
    }

    function updateCandidateBackButton() {
      document.getElementById("candidateBackBtn").hidden = candidateBackStack.length === 0;
    }

    function showModelsForMaker(maker, rememberBack = true) {
      if (rememberBack) candidateBackStack.push({ type: "list", key: activeCandidateKey });
      activeCandidateMaker = maker;
      activeCandidateModel = "";
      selectedCandidateParts.clear();
      selectedCandidateItem = null;
      candidateBulkAddConfirm = false;
      const models = (readMakerModelMap()[maker] || []).filter((model) =>
        matchesCandidateSearch([maker, model])
      );
      activeCandidateKey = "items.model";
      document.querySelectorAll("[data-candidate-key]").forEach((button) => {
        button.classList.toggle("active", button.dataset.candidateKey === activeCandidateKey);
      });
      document.getElementById("makerCandidateTabs").style.display = "none";
      updateCandidateContext();
      updateCandidateActionButtons();
      updateCandidateBackButton();
      const target = document.getElementById("candidateList");
      if (!models.length) {
        target.innerHTML = `<div class="empty">${escapeHtml(maker)}の型式候補はまだありません</div>`;
        return;
      }
      target.innerHTML = `
        <table class="record-table candidate-value-table">
          <thead><tr><th>メーカー</th><th>型式</th></tr></thead>
          <tbody>
            ${models.map((model) => `
              <tr class="candidate-row" data-action="selectCandidateItem" data-type="makerModel" data-maker="${escapeHtml(maker)}" data-value="${escapeHtml(model)}">
                <td data-label="メーカー">${escapeHtml(maker)}</td>
                <td data-label="型式"><button type="button" data-action="showPartsForMakerModel" data-maker="${escapeHtml(maker)}" data-model="${escapeHtml(model)}">${escapeHtml(model)}</button></td>
              </tr>
            `).join("")}
          </tbody>
        </table>`;
    }

    function showPartsForMakerModel(maker, model, rememberBack = true) {
      if (rememberBack) candidateBackStack.push({ type: "models", maker });
      activeCandidateMaker = maker;
      activeCandidateModel = model;
      selectedCandidateParts.clear();
      selectedCandidateItem = null;
      candidateBulkAddConfirm = false;
      const parts = (readMakerModelPartMap()[makerModelKey(maker, model)] || []).filter((part) =>
        matchesCandidateSearch([maker, model, part, partNumberForRow(maker, model, part)])
      );
      activeCandidateKey = "items.part";
      document.querySelectorAll("[data-candidate-key]").forEach((button) => {
        button.classList.toggle("active", button.dataset.candidateKey === activeCandidateKey);
      });
      document.getElementById("makerCandidateTabs").style.display = "none";
      updateCandidateContext();
      updateCandidateActionButtons();
      updateCandidateBackButton();
      const target = document.getElementById("candidateList");
      if (!parts.length) {
        target.innerHTML = `<div class="empty">${escapeHtml(maker)} / ${escapeHtml(model)} の部品名・部品番号はまだありません</div>`;
        return;
      }
      target.innerHTML = `
        <table class="record-table part-choice-table">
          <thead><tr><th><div class="part-choice part-choice-heading"><span>部品名</span><span class="part-number">部品番号</span></div></th></tr></thead>
          <tbody>
            ${parts.map((part) => `
              <tr class="part-choice-row${selectedCandidateParts.has(part) ? " selected" : ""}">
                <td data-label="部品名・部品番号">
                  <button class="part-choice" type="button" data-action="toggleCandidatePart" data-value="${escapeHtml(part)}" data-part-no="${escapeHtml(partNumberForRow(maker, model, part))}">
                    <span>${escapeHtml(part)}</span>
                    <span class="part-number">${escapeHtml(partNumberForRow(maker, model, part))}</span>
                  </button>
                </td>
              </tr>
            `).join("")}
          </tbody>
        </table>`;
      updateCandidateActionButtons();
    }

    function goCandidateBack() {
      const previous = candidateBackStack.pop();
      if (!previous) return;
      if (previous.type === "models") {
        showModelsForMaker(previous.maker, false);
      } else {
        activeCandidateKey = previous.key;
        renderCandidateList();
      }
      updateCandidateBackButton();
    }

    function addCandidateToEstimate(maker, model, part, partNo) {
      addCandidatePartsToEstimate(maker, model, [{ part, partNo }]);
    }

    function addCandidatePartsToEstimate(maker, model, parts) {
      const selectedParts = parts
        .map((item) => ({
          part: String(item.part || "").trim(),
          partNo: String(item.partNo || "").trim(),
        }))
        .filter((item) => item.part);
      if (!selectedParts.length) return;
      rememberUndoState();
      const rows = valuesToRows(collect());
      const lastContentIndex = rows.reduce((last, row, rowIndex) => rowHasContent(row) ? rowIndex : last, -1);
      let index = lastContentIndex + 1;
      selectedParts.forEach((item) => {
        if (index >= rows.length) rows.push({});
        rows[index] = {
          ...rows[index],
          maker,
          model,
          part: item.part,
          part_no: item.partNo || partNumberForRow(maker, model, item.part),
        };
        index += 1;
      });
      writeRows(rows);
      fitMobileSheet();
      fitPrintRows();
      updatePrimaryButtons();
      showView("estimate");
    }

    function selectedPartItems() {
      if (!activeCandidateMaker || !activeCandidateModel) return [];
      return Array.from(selectedCandidateParts).map((part) => ({
        part,
        partNo: partNumberForRow(activeCandidateMaker, activeCandidateModel, part),
      }));
    }

    function candidateMakerOptions() {
      const history = readHistory();
      const map = readMakerModelMap();
      return mergeUniqueText(history["items.maker"] || [], Object.keys(map));
    }

    function fillSelect(select, values, selectedValue, newLabel) {
      const options = values.map((value) =>
        `<option value="${escapeHtml(value)}"${value === selectedValue ? " selected" : ""}>${escapeHtml(value)}</option>`
      );
      options.push(`<option value="__new__"${selectedValue === "__new__" ? " selected" : ""}>＋ ${newLabel}</option>`);
      select.innerHTML = options.join("");
      if (!select.value && values.length) select.value = values[0];
    }

    function candidateAddMakerValue() {
      const select = document.getElementById("candidateMakerSelect");
      if (select?.value === "__new__") {
        return document.getElementById("candidateNewMakerText").value.trim();
      }
      return String(select?.value || "").trim();
    }

    function candidateAddModelValue() {
      const select = document.getElementById("candidateModelSelect");
      if (select?.value === "__new__") {
        return document.getElementById("candidateNewModelText").value.trim();
      }
      return String(select?.value || "").trim();
    }

    function refreshCandidateAddModelOptions() {
      const makerSelect = document.getElementById("candidateMakerSelect");
      const modelSelect = document.getElementById("candidateModelSelect");
      const newMaker = document.getElementById("candidateNewMakerText");
      const newModel = document.getElementById("candidateNewModelText");
      const maker = makerSelect.value === "__new__" ? "" : makerSelect.value;
      newMaker.hidden = makerSelect.value !== "__new__";
      if (makerSelect.value === "__new__") {
        fillSelect(modelSelect, [], "__new__", "新規型式");
        modelSelect.value = "__new__";
      } else {
        const models = readMakerModelMap()[maker] || [];
        fillSelect(modelSelect, models, activeCandidateMaker === maker ? activeCandidateModel : models[0], "新規型式");
      }
      newModel.hidden = modelSelect.value !== "__new__";
      updateCandidateActionButtons();
    }

    function refreshCandidateAddMakerOptions() {
      const makerSelect = document.getElementById("candidateMakerSelect");
      const makers = candidateMakerOptions();
      const selected = activeCandidateMaker || makers[0] || "__new__";
      fillSelect(makerSelect, makers, selected, "新規メーカー");
      refreshCandidateAddModelOptions();
    }

    function resetCandidateAddPanel() {
      candidateAddMode = "";
      document.getElementById("candidateText").value = "";
      document.getElementById("candidatePartNoText").value = "";
      document.getElementById("candidateNewMakerText").value = "";
      document.getElementById("candidateNewModelText").value = "";
      document.getElementById("candidateText").placeholder = "追加する文字";
      document.getElementById("candidateMakerSelect").hidden = true;
      document.getElementById("candidateNewMakerText").hidden = true;
      document.getElementById("candidateModelSelect").hidden = true;
      document.getElementById("candidateNewModelText").hidden = true;
      document.getElementById("candidatePartNoText").hidden = true;
      document.getElementById("candidateAddPanel").hidden = true;
      updateCandidateActionButtons();
    }

    function openCandidateAddPanel() {
      const panel = document.getElementById("candidateAddPanel");
      panel.hidden = false;
      document.getElementById("candidateMenu").hidden = true;
      document.getElementById("candidateText").value = "";
      document.getElementById("candidatePartNoText").value = "";
      document.getElementById("candidateNewMakerText").value = "";
      document.getElementById("candidateNewModelText").value = "";
      selectCandidateAddMode("part");
      updateCandidateActionButtons();
    }

    function selectCandidateAddMode(mode) {
      candidateAddMode = mode;
      const text = document.getElementById("candidateText");
      const partNo = document.getElementById("candidatePartNoText");
      const makerSelect = document.getElementById("candidateMakerSelect");
      const modelSelect = document.getElementById("candidateModelSelect");
      const newMaker = document.getElementById("candidateNewMakerText");
      const newModel = document.getElementById("candidateNewModelText");
      text.value = "";
      partNo.value = "";
      text.placeholder = mode === "part" ? "部品名" : "メーカー名";
      makerSelect.hidden = mode !== "part";
      modelSelect.hidden = mode !== "part";
      newMaker.hidden = true;
      newModel.hidden = true;
      partNo.hidden = mode !== "part";
      if (mode === "part") refreshCandidateAddMakerOptions();
      text.focus();
      updateCandidateActionButtons();
    }

    function selectCandidateItem(row) {
      selectedCandidateParts.clear();
      candidateBulkAddConfirm = false;
      document.querySelectorAll("#candidateList .candidate-row.selected").forEach((item) => {
        item.classList.remove("selected");
      });
      row.classList.add("selected");
      selectedCandidateItem = {
        type: row.dataset.type,
        key: row.dataset.key,
        maker: row.dataset.maker,
        value: row.dataset.value,
      };
      updateCandidateActionButtons();
    }

    function toggleCandidatePart(button) {
      const part = String(button?.dataset.value || "").trim();
      if (!part) return;
      const row = button.closest("tr");
      selectedCandidateItem = null;
      document.querySelectorAll("#candidateList .candidate-row.selected").forEach((item) => {
        item.classList.remove("selected");
      });
      if (selectedCandidateParts.has(part)) {
        selectedCandidateParts.delete(part);
        row?.classList.remove("selected");
      } else {
        selectedCandidateParts.add(part);
        row?.classList.add("selected");
      }
      candidateBulkAddConfirm = false;
      updateCandidateActionButtons();
    }

    function addSelectedCandidateParts() {
      if (!candidateBulkAddConfirm) {
        candidateBulkAddConfirm = true;
        updateCandidateActionButtons();
        return;
      }
      addCandidatePartsToEstimate(activeCandidateMaker, activeCandidateModel, selectedPartItems());
    }

    function editSelectedCandidatePart() {
      if (selectedCandidateItem?.type === "history") {
        editCandidateValue(selectedCandidateItem.key, selectedCandidateItem.value);
        selectedCandidateItem = null;
        updateCandidateActionButtons();
        return;
      }
      if (selectedCandidateItem?.type === "makerModel") {
        editMakerModel(selectedCandidateItem.maker, selectedCandidateItem.value);
        selectedCandidateItem = null;
        updateCandidateActionButtons();
        return;
      }
      const [part] = Array.from(selectedCandidateParts);
      if (!part) return;
      editMakerModelPart(activeCandidateMaker, activeCandidateModel, part);
    }

    function askSelectedCandidatePartsDelete() {
      if (selectedCandidateItem?.type === "history") {
        askCandidateDelete(selectedCandidateItem.key, selectedCandidateItem.value);
        return;
      }
      if (selectedCandidateItem?.type === "makerModel") {
        askMakerModelDelete(selectedCandidateItem.maker, selectedCandidateItem.value);
        return;
      }
      const values = Array.from(selectedCandidateParts);
      if (!values.length) return;
      candidateBulkAddConfirm = false;
      updateCandidateActionButtons();
      if (values.length === 1) {
        askMakerModelPartDelete(activeCandidateMaker, activeCandidateModel, values[0]);
        return;
      }
      pendingCandidateDelete = {
        type: "makerModelParts",
        key: "items.part",
        maker: activeCandidateMaker,
        model: activeCandidateModel,
        values,
      };
      document.getElementById("candidateDeleteTitle").textContent = `選択した${values.length}件の候補を削除しますか？`;
      document.getElementById("candidateDeleteConfirm").hidden = false;
    }

    function addCandidateFromList() {
      const value = document.getElementById("candidateText").value.trim();
      const partNo = document.getElementById("candidatePartNoText").value.trim();
      const wasPartMode = candidateAddMode === "part";
      if (candidateAddMode === "maker") {
        rememberValue("items.maker", value);
        activeCandidateKey = "items.maker";
      }
      if (candidateAddMode === "part") {
        const maker = candidateAddMakerValue();
        const model = candidateAddModelValue();
        if (!maker || !model) return;
        rememberValue("items.maker", maker);
        const modelMap = readMakerModelMap();
        modelMap[maker] = addUnique(modelMap[maker], model);
        writeMakerModelMap(modelMap);
        const partMap = readMakerModelPartMap();
        const key = makerModelKey(maker, model);
        partMap[key] = addUnique(partMap[key], value);
        writeMakerModelPartMap(partMap);
        const numberMap = readPartNumberMap();
        numberMap[partNumberKey(maker, model, value)] = partNo;
        numberMap[partMapKey(model, value)] = partNo;
        writePartNumberMap(numberMap);
        activeCandidateMaker = maker;
        activeCandidateModel = model;
      }
      resetCandidateAddPanel();
      if (wasPartMode && activeCandidateMaker && activeCandidateModel) {
        showPartsForMakerModel(activeCandidateMaker, activeCandidateModel, false);
      } else {
        refreshCandidateView();
      }
    }

    function editCandidateValue(key, oldValue) {
      const nextValue = prompt("候補を編集", oldValue);
      const text = String(nextValue || "").trim();
      if (!text || text === oldValue) return;
      const history = readHistory();
      const normalizedKey = historyKey(key);
      history[normalizedKey] = (history[normalizedKey] || []).map((item) => item === oldValue ? text : item);
      writeHistory(history);
      renderCandidateList();
    }

    function editMakerModel(maker, oldModel) {
      const nextModel = prompt("型式を編集", oldModel);
      const text = String(nextModel || "").trim();
      if (!text || text === oldModel) return;
      const map = readMakerModelMap();
      map[maker] = (map[maker] || []).map((item) => item === oldModel ? text : item);
      writeMakerModelMap(map);
      const partMap = readMakerModelPartMap();
      const oldKey = makerModelKey(maker, oldModel);
      const newKey = makerModelKey(maker, text);
      if (partMap[oldKey]) {
        partMap[newKey] = mergeUniqueText(partMap[newKey] || [], partMap[oldKey] || []);
        delete partMap[oldKey];
        writeMakerModelPartMap(partMap);
      }
      const numberMap = readPartNumberMap();
      Object.keys(numberMap).forEach((key) => {
        const parts = key.split("|||");
        if (parts.length === 3 && parts[0] === maker && parts[1] === oldModel) {
          numberMap[partNumberKey(maker, text, parts[2])] = numberMap[key];
          delete numberMap[key];
        }
        if (parts.length === 2 && parts[0] === oldModel) {
          numberMap[partMapKey(text, parts[1])] = numberMap[key];
          delete numberMap[key];
        }
      });
      writePartNumberMap(numberMap);
      showModelsForMaker(maker, false);
    }

    function editMakerModelPart(maker, model, oldPart) {
      const nextPart = prompt("部品名を編集", oldPart);
      const text = String(nextPart || "").trim();
      if (!text || text === oldPart) return;
      const partMap = readMakerModelPartMap();
      const key = makerModelKey(maker, model);
      partMap[key] = (partMap[key] || []).map((item) => item === oldPart ? text : item);
      writeMakerModelPartMap(partMap);
      const numberMap = readPartNumberMap();
      const makerNumberKey = partNumberKey(maker, model, oldPart);
      const oldNumberKey = partMapKey(model, oldPart);
      if (numberMap[makerNumberKey]) {
        numberMap[partNumberKey(maker, model, text)] = numberMap[makerNumberKey];
        delete numberMap[makerNumberKey];
      }
      if (numberMap[oldNumberKey]) {
        numberMap[partMapKey(model, text)] = numberMap[oldNumberKey];
        delete numberMap[oldNumberKey];
      }
      writePartNumberMap(numberMap);
      showPartsForMakerModel(maker, model, false);
    }

    function selectCandidateKey(key) {
      candidateBackStack = [];
      activeCandidateMaker = "";
      activeCandidateModel = "";
      selectedCandidateParts.clear();
      candidateBulkAddConfirm = false;
      activeCandidateKey = key;
      renderCandidateList();
    }

    function askCandidateDelete(key, value) {
      pendingCandidateDelete = { type: "history", key, value };
      document.getElementById("candidateDeleteTitle").textContent = `「${value}」を削除しますか？`;
      document.getElementById("candidateDeleteConfirm").hidden = false;
    }

    function askMakerModelDelete(maker, model) {
      pendingCandidateDelete = { type: "makerModel", key: "items.model", maker, value: model };
      document.getElementById("candidateDeleteTitle").textContent = `「${maker}」の型式「${model}」を削除しますか？`;
      document.getElementById("candidateDeleteConfirm").hidden = false;
    }

    function askMakerModelPartDelete(maker, model, part) {
      pendingCandidateDelete = { type: "makerModelPart", key: "items.part", maker, model, value: part };
      document.getElementById("candidateDeleteTitle").textContent = `「${maker}」の型式「${model}」の部品「${part}」を削除しますか？`;
      document.getElementById("candidateDeleteConfirm").hidden = false;
    }

    function closeCandidateDeleteConfirm() {
      document.getElementById("candidateDeleteConfirm").hidden = true;
      pendingCandidateDelete = null;
    }

    function confirmCandidateDelete() {
      if (pendingCandidateDelete?.type === "makerModel") {
        deleteMakerModel(pendingCandidateDelete.maker, pendingCandidateDelete.value);
      } else if (pendingCandidateDelete?.type === "makerModelPart") {
        deleteMakerModelPart(pendingCandidateDelete.maker, pendingCandidateDelete.model, pendingCandidateDelete.value);
      } else if (pendingCandidateDelete?.type === "makerModelParts") {
        deleteMakerModelParts(pendingCandidateDelete.maker, pendingCandidateDelete.model, pendingCandidateDelete.values);
      } else if (pendingCandidateDelete) {
        const trash = readList(CANDIDATE_TRASH_KEY);
        trash.unshift({
          ...pendingCandidateDelete,
          label: candidateLabel(pendingCandidateDelete.key),
          deletedAt: nowText(),
        });
        writeList(CANDIDATE_TRASH_KEY, trash);
        forgetValue(pendingCandidateDelete.key, pendingCandidateDelete.value);
        renderCandidateList();
      }
      closeCandidateDeleteConfirm();
    }

    function deleteMakerModel(maker, model) {
      const map = readMakerModelMap();
      map[maker] = (map[maker] || []).filter((item) => item !== model);
      writeMakerModelMap(map);
      const trash = readList(CANDIDATE_TRASH_KEY);
      trash.unshift({
        type: "makerModel",
        maker,
        key: "items.model",
        value: model,
        label: `型式（${maker}）`,
        deletedAt: nowText(),
      });
      writeList(CANDIDATE_TRASH_KEY, trash);
      showModelsForMaker(maker);
    }

    function deleteMakerModelPart(maker, model, part) {
      const map = readMakerModelPartMap();
      const key = makerModelKey(maker, model);
      map[key] = (map[key] || []).filter((item) => item !== part);
      writeMakerModelPartMap(map);
      const trash = readList(CANDIDATE_TRASH_KEY);
      trash.unshift({
        type: "makerModelPart",
        maker,
        model,
        key: "items.part",
        value: part,
        label: `部品名（${maker} / ${model}）`,
        deletedAt: nowText(),
      });
      writeList(CANDIDATE_TRASH_KEY, trash);
      showPartsForMakerModel(maker, model);
    }

    function deleteMakerModelParts(maker, model, parts) {
      const values = (parts || []).map((part) => String(part || "").trim()).filter(Boolean);
      if (!values.length) return;
      const map = readMakerModelPartMap();
      const key = makerModelKey(maker, model);
      const valueSet = new Set(values);
      map[key] = (map[key] || []).filter((item) => !valueSet.has(item));
      writeMakerModelPartMap(map);
      const trash = readList(CANDIDATE_TRASH_KEY);
      values.forEach((part) => {
        trash.unshift({
          type: "makerModelPart",
          maker,
          model,
          key: "items.part",
          value: part,
          label: `部品名（${maker} / ${model}）`,
          deletedAt: nowText(),
        });
      });
      writeList(CANDIDATE_TRASH_KEY, trash);
      selectedCandidateParts.clear();
      showPartsForMakerModel(maker, model);
    }

    function moveCaretToEnd(input) {
      if (!input || typeof input.setSelectionRange !== "function") return;
      const length = input.value.length;
      requestAnimationFrame(() => {
        try { input.setSelectionRange(length, length); } catch {}
      });
    }

    function collect() {
      const data = {};
      fields().forEach((el) => { data[el.dataset.key] = el.value; });
      data.rowCount = itemRows.children.length;
      return data;
    }

    function apply(data) {
      renderRows(Math.max(1, Number(data.rowCount || 14)));
      fields().forEach((el) => { el.value = data[el.dataset.key] || ""; });
    }

    function dataJson(data) {
      return JSON.stringify(data || collect());
    }

    function updateUndoButton() {
      document.getElementById("undoBtn").disabled = undoStack.length === 0;
    }

    function rememberUndoState() {
      const snapshot = dataJson(collect());
      if (snapshot === lastUndoSnapshot) return;
      undoStack.push(snapshot);
      if (undoStack.length > 40) undoStack.shift();
      lastUndoSnapshot = snapshot;
      updateUndoButton();
    }

    function openUndoConfirm() {
      if (!undoStack.length) return;
      document.getElementById("undoConfirm").hidden = false;
    }

    function closeUndoConfirm() {
      document.getElementById("undoConfirm").hidden = true;
    }

    function confirmUndo() {
      const snapshot = undoStack.pop();
      if (!snapshot) return closeUndoConfirm();
      const data = JSON.parse(snapshot);
      apply(data);
      lastUndoSnapshot = dataJson(data);
      fitMobileSheet();
      fitPrintRows();
      updatePrimaryButtons();
      updateUndoButton();
      closeUndoConfirm();
    }

    function hasContent(data) {
      return Object.entries(data).some(([key, value]) => key !== "rowCount" && String(value || "").trim() !== "");
    }

    function updatePrimaryButtons() {
      const data = collect();
      const rows = valuesToRows(data);
      const hasAnyContent = hasContent(data);
      const isFullDefaultRows = itemRows.children.length >= 14 && rows.slice(0, 14).every(rowHasContent);
      document.getElementById("saveBtn").disabled = !hasAnyContent;
      document.getElementById("newBtn").disabled = !hasAnyContent;
      document.getElementById("addRowBtn").disabled = !isFullDefaultRows;
      document.getElementById("removeRowBtn").disabled = itemRows.children.length <= 14;
    }

    function markClean(data = collect()) {
      lastSavedJson = dataJson(data);
    }

    function saveCurrentDraft() {
      const data = collect();
      if (!hasContent(data) || dataJson(data) === lastSavedJson) return null;
      const drafts = readList(DRAFT_KEY);
      const id = activeDraftId || `d_${Date.now()}`;
      const record = { id, title: titleFor(data), company: companyFor(data), updatedAt: nowText(), data };
      const index = drafts.findIndex((item) => item.id === id);
      if (index >= 0) drafts[index] = record;
      else drafts.unshift(record);
      activeDraftId = id;
      writeList(DRAFT_KEY, drafts);
      renderRecordList("draft");
      return id;
    }

    function removeDraft(id) {
      if (!id) return;
      writeList(DRAFT_KEY, readList(DRAFT_KEY).filter((item) => item.id !== id));
      if (activeDraftId === id) activeDraftId = null;
      renderRecordList("draft");
    }

    function deleteRow(index = itemRows.children.length - 1) {
      const current = collect();
      const rows = valuesToRows(current);
      if (rows.length <= 1 || index < 0) return;
      rows.splice(index, 1);
      Object.keys(current).forEach((key) => {
        if (key.startsWith("items.")) delete current[key];
      });
      current.rowCount = rows.length;
      apply(current);
      writeRows(rows);
      fitMobileSheet();
      fitPrintRows();
      updatePrimaryButtons();
    }

    function fitPrintRows() {
      const rowCount = itemRows.children.length;
      const compact = rowCount > 14;
      const dense = rowCount > 18;
      document.documentElement.style.setProperty("--print-item-row-height", `${dense ? 19 : compact ? 22 : 27}px`);
      document.documentElement.style.setProperty("--print-item-header-height", `${dense ? 20 : compact ? 22 : 24}px`);
      document.documentElement.style.setProperty("--print-notes-height", `${dense ? 56 : compact ? 68 : 85}px`);
      document.documentElement.style.setProperty("--print-font-size", `${dense ? 9 : compact ? 10 : 11}px`);
    }

    function titleFor(data) {
      return data.user_name || data.recipient || data["items.0.part"] || "無題の見積もり";
    }

    function companyFor(data) {
      return data.user_name || data.recipient || "会社名未入力";
    }

    function nowText() {
      const d = new Date();
      const pad = (n) => String(n).padStart(2, "0");
      return `${d.getFullYear()}/${pad(d.getMonth() + 1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    function showView(name) {
      if (name !== "estimate") saveCurrentDraft();
      document.querySelectorAll(".view").forEach((view) => { view.hidden = true; });
      document.getElementById(`${name}View`).hidden = false;
      document.querySelectorAll("[data-view-button]").forEach((button) => {
        button.classList.toggle("active", button.dataset.viewButton === name);
      });
      if (name === "draft") renderRecordList("draft");
      if (name === "saved") renderRecordList("saved");
      if (name === "candidate") renderCandidateList();
      if (name === "trash") renderRecordList("trash");
    }

    function saveRecord() {
      if (!hasContent(collect())) return;
      const missingPlace = firstMissingMakerPlace();
      if (missingPlace) {
        showMakerMissing(missingPlace);
        return;
      }
      rememberUndoState();
      sortRowsByMaker();
      const records = readList(STORAGE_KEY);
      const data = collect();
      rememberData(data);
      const id = activeId || `q_${Date.now()}`;
      const record = { id, title: titleFor(data), company: companyFor(data), updatedAt: nowText(), data };
      const index = records.findIndex((item) => item.id === id);
      if (index >= 0) records[index] = record;
      else records.unshift(record);
      activeId = id;
      removeDraft(activeDraftId);
      activeDraftId = null;
      markClean(data);
      writeList(STORAGE_KEY, records);
      renderRecordList("saved");
    }

    function newRecord() {
      if (!hasContent(collect())) return;
      saveCurrentDraft();
      activeId = null;
      activeDraftId = null;
      apply({ rowCount: 14 });
      markClean({ rowCount: 14 });
      updatePrimaryButtons();
      showView("estimate");
    }

    function loadRecord(id) {
      const record = readList(STORAGE_KEY).find((item) => item.id === id);
      if (!record) return;
      activeId = record.id;
      activeDraftId = null;
      apply(record.data);
      markClean(record.data);
      updatePrimaryButtons();
      showView("estimate");
    }

    function loadDraft(id) {
      const record = readList(DRAFT_KEY).find((item) => item.id === id);
      if (!record) return;
      activeId = null;
      activeDraftId = record.id;
      apply(record.data);
      markClean(record.data);
      updatePrimaryButtons();
      showView("estimate");
    }

    function moveToTrash(id) {
      const records = readList(STORAGE_KEY);
      const index = records.findIndex((item) => item.id === id);
      if (index < 0) return;
      const [record] = records.splice(index, 1);
      const trash = readList(TRASH_KEY);
      trash.unshift({ ...record, deletedAt: nowText() });
      writeList(STORAGE_KEY, records);
      writeList(TRASH_KEY, trash);
      if (activeId === id) activeId = null;
      renderRecordList("saved");
    }

    function restoreRecord(id) {
      const trash = readList(TRASH_KEY);
      const index = trash.findIndex((item) => item.id === id);
      if (index < 0) return;
      const [record] = trash.splice(index, 1);
      const records = readList(STORAGE_KEY);
      records.unshift(record);
      writeList(TRASH_KEY, trash);
      writeList(STORAGE_KEY, records);
      renderRecordList("trash");
    }

    function deleteForever(id) {
      writeList(TRASH_KEY, readList(TRASH_KEY).filter((item) => item.id !== id));
      renderRecordList("trash");
    }

    function deleteCandidateForever(index) {
      const list = readList(CANDIDATE_TRASH_KEY);
      list.splice(Number(index), 1);
      writeList(CANDIDATE_TRASH_KEY, list);
      renderRecordList("trash");
    }

    function candidateTrashContext(item) {
      let maker = item.maker || "";
      let model = item.model || "";
      const label = String(item.label || "");
      if (!maker && item.key === "items.model") {
        const match = label.match(/型式（(.+)）/);
        if (match) maker = match[1];
      }
      if ((!maker || !model) && item.key === "items.part") {
        const match = label.match(/部品名（(.+) \/ (.+)）/);
        if (match) {
          maker = maker || match[1];
          model = model || match[2];
        }
      }
      return { maker, model };
    }

    function restoreCandidate(index) {
      const list = readList(CANDIDATE_TRASH_KEY);
      const itemIndex = Number(index);
      const item = list[itemIndex];
      if (!item) return;
      const { maker, model } = candidateTrashContext(item);
      if (item.type === "makerModel" || (item.key === "items.model" && maker)) {
        const map = readMakerModelMap();
        map[maker] = mergeUniqueText(map[maker] || [], [item.value]);
        writeMakerModelMap(map);
      } else if (item.type === "makerModelPart" || (item.key === "items.part" && maker && model)) {
        const partMap = readMakerModelPartMap();
        const key = makerModelKey(maker, model);
        partMap[key] = mergeUniqueText(partMap[key] || [], [item.value]);
        writeMakerModelPartMap(partMap);
      } else {
        rememberValue(item.key, item.value);
      }
      list.splice(itemIndex, 1);
      writeList(CANDIDATE_TRASH_KEY, list);
      renderRecordList("trash");
    }

    function askPermanentDelete(type, value, label) {
      pendingPermanentDelete = { type, value };
      document.getElementById("permanentDeleteTitle").textContent = `${label}を完全削除しますか？`;
      document.getElementById("permanentDeleteConfirm").hidden = false;
    }

    function closePermanentDeleteConfirm() {
      document.getElementById("permanentDeleteConfirm").hidden = true;
      pendingPermanentDelete = null;
    }

    function confirmPermanentDelete() {
      if (pendingPermanentDelete?.type === "estimate") {
        deleteForever(pendingPermanentDelete.value);
      }
      if (pendingPermanentDelete?.type === "candidate") {
        deleteCandidateForever(pendingPermanentDelete.value);
      }
      closePermanentDeleteConfirm();
    }

    function fitMobileSheet() {
      const estimateView = document.getElementById("estimateView");
      const sheet = document.getElementById("sheet");
      const wrap = document.querySelector(".wrap");
      const shouldFit = window.matchMedia("(max-width: 1180px), (pointer: coarse)").matches;
      if (!shouldFit) {
        document.documentElement.style.setProperty("--sheet-scale", "1");
        estimateView.style.minHeight = "";
        wrap.style.overflowX = "";
        wrap.style.overflowY = "";
        return;
      }
      const toolbar = document.querySelector(".toolbar");
      const availableWidth = Math.max(320, window.innerWidth - 20);
      const availableHeight = Math.max(260, window.innerHeight - toolbar.getBoundingClientRect().height - 20);
      const baseWidth = 1120;
      const baseHeight = sheet.scrollHeight;
      const fitWidth = availableWidth / baseWidth;
      const fitHeight = availableHeight / baseHeight;
      const isLandscape = window.innerWidth > window.innerHeight;
      const readableFloor = window.innerWidth >= 700 ? 0.68 : 0.46;
      const scale = isLandscape
        ? Math.min(1, fitWidth)
        : Math.min(1, Math.max(fitWidth, readableFloor));
      document.documentElement.style.setProperty("--sheet-scale", String(scale));
      estimateView.style.minHeight = `${Math.ceil(sheet.scrollHeight * scale)}px`;
      wrap.style.overflowX = isLandscape ? "hidden" : "auto";
      wrap.style.overflowY = "auto";
    }

    function openClearConfirm() {
      document.getElementById("clearConfirm").hidden = false;
    }

    function closeClearConfirm() {
      document.getElementById("clearConfirm").hidden = true;
    }

    function recordMatchesSearch(record, query) {
      const text = String(query || "").trim();
      if (!text) return true;
      const values = [
        record.company,
        record.title,
        record.updatedAt,
        ...Object.values(record.data || {}),
      ].map((value) => String(value || ""));
      return values.some((value) => value.includes(text) || readingFor(value).includes(text));
    }

    function renderRecordList(kind) {
      const isTrash = kind === "trash";
      const isDraft = kind === "draft";
      const target = document.getElementById(isTrash ? "trashList" : isDraft ? "draftList" : "savedList");
      let list = readList(isTrash ? TRASH_KEY : isDraft ? DRAFT_KEY : STORAGE_KEY);
      if (!isTrash && !isDraft) {
        list = list.filter((record) =>
          recordMatchesSearch(record, document.getElementById("savedSearchInput").value)
        );
      }
      if (!list.length) {
        const searchText = document.getElementById("savedSearchInput")?.value.trim();
        target.innerHTML = isTrash
          ? renderCandidateTrashHtml(true)
          : `<div class="empty">${isDraft ? "未保存の見積もりはありません" : searchText ? "検索結果はありません" : "保存した見積もりはありません"}</div>`;
        return;
      }
      target.innerHTML = `
        <table class="record-table">
          <thead><tr><th>会社名</th><th>${isTrash ? "削除日時" : isDraft ? "退避日時" : "保存日時"}</th><th>操作</th></tr></thead>
          <tbody>
            ${list.map((record) => `
              <tr>
                <td>${escapeHtml(record.company || record.title)}</td>
                <td>${escapeHtml(isTrash ? record.deletedAt : record.updatedAt)}</td>
                <td>
                  ${isTrash
                    ? `<button type="button" data-action="restore" data-id="${record.id}">復元</button>
                       <button class="danger" type="button" data-action="delete" data-id="${record.id}">完全削除</button>`
                    : isDraft
                    ? `<button type="button" data-action="openDraft" data-id="${record.id}">開く</button>
                       <button class="danger" type="button" data-action="deleteDraft" data-id="${record.id}">削除</button>`
                    : `<button type="button" data-action="open" data-id="${record.id}">開く</button>
                       <button class="danger" type="button" data-action="trash" data-id="${record.id}">ゴミ箱へ</button>`}
                </td>
              </tr>
            `).join("")}
          </tbody>
        </table>${isTrash ? renderCandidateTrashHtml(false) : ""}`;
    }

    function renderCandidateTrashHtml(showEmptyWhenNoRecords) {
      const list = readList(CANDIDATE_TRASH_KEY);
      if (!list.length) {
        return showEmptyWhenNoRecords ? `<div class="empty">ゴミ箱は空です</div>` : "";
      }
      return `
        <h2 style="margin-top:18px;">削除した候補</h2>
        <table class="record-table">
          <thead><tr><th>項目</th><th>候補</th><th>削除日時</th><th>操作</th></tr></thead>
          <tbody>
            ${list.map((item, index) => `
              <tr>
                <td>${escapeHtml(item.label || candidateLabel(item.key))}</td>
                <td>${escapeHtml(item.value)}</td>
                <td>${escapeHtml(item.deletedAt)}</td>
                <td>
                  <button type="button" data-action="restoreCandidate" data-index="${index}">復元</button>
                  <button class="danger" type="button" data-action="deleteCandidateForever" data-index="${index}">完全削除</button>
                </td>
              </tr>
            `).join("")}
          </tbody>
        </table>`;
    }

    function escapeHtml(text) {
      return String(text || "").replace(/[&<>"']/g, (ch) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;"
      }[ch]));
    }

      if (button.dataset.action === "open") loadRecord(button.dataset.id);
      if (button.dataset.action === "trash") moveToTrash(button.dataset.id);
    });

    document.getElementById("draftList").addEventListener("click", (event) => {
      const button = event.target.closest("button[data-action]");
      if (!button) return;
      if (button.dataset.action === "openDraft") loadDraft(button.dataset.id);
      if (button.dataset.action === "deleteDraft") removeDraft(button.dataset.id);
    });

    document.getElementById("trashList").addEventListener("click", (event) => {
      const button = event.target.closest("button[data-action]");
      if (!button) return;
      if (button.dataset.action === "restore") restoreRecord(button.dataset.id);
      if (button.dataset.action === "delete") askPermanentDelete("estimate", button.dataset.id, "この見積もり");
      if (button.dataset.action === "restoreCandidate") restoreCandidate(button.dataset.index);
      if (button.dataset.action === "deleteCandidateForever") askPermanentDelete("candidate", button.dataset.index, "この候補");
    });

    document.getElementById("permanentDeleteNoBtn").addEventListener("click", closePermanentDeleteConfirm);
    document.getElementById("permanentDeleteYesBtn").addEventListener("click", confirmPermanentDelete);

    window.addEventListener("beforeprint", fitPrintRows);

    async function initApp() {
      await loadCloudState();
      renderRows(14);
      renderRecordList("saved");
      renderRecordList("draft");
      renderCandidateList();
      renderRecordList("trash");
      markClean({ rowCount: 14 });
      showView("estimate");
      fitMobileSheet();
      fitPrintRows();
      updatePrimaryButtons();
      updateUndoButton();
      window.addEventListener("resize", fitMobileSheet);
      window.addEventListener("orientationchange", fitMobileSheet);
    }

    initApp();
  </script>
</body>
</html>
